<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0e11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MMate">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>MMate</title>
<style>
  :root{
    --bg:#0d0e11;--panel:#16181e;--panel2:#1d2027;--line:#2a2e37;
    --txt:#eceef1;--muted:#8c93a0;--muted2:#5f6671;--accent:#f0a23b;
    --up:#46c46e;--down:#ec6a5e;
    --chest:#e5645b;--back:#37b59e;--delts:#f0a23b;--legs:#9384ea;--arms:#5aa0e0;
    font-size:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--txt);overscroll-behavior-y:none;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;}
  .app{max-width:520px;margin:0 auto;padding-top:env(safe-area-inset-top);padding-bottom:calc(84px + env(safe-area-inset-bottom));display:flex;flex-direction:column;min-height:100dvh;}
  main{flex:1;padding:14px 16px 24px;}
  .eyebrow{font-size:.66rem;letter-spacing:.2em;color:var(--muted);font-weight:700;}
  h2{margin:.05em 0 12px;font-size:1.5rem;font-weight:800;}
  .pv{color:var(--muted);font-size:.78rem;}

  /* ===== メニュー切替チップ ===== */
  .tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 4px;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;min-height:44px;padding:0 16px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-weight:700;font-size:.95rem;display:flex;align-items:center;gap:7px;}
  .tab .pip{width:9px;height:9px;border-radius:50%;background:var(--tabc,var(--muted2));}
  .tab[aria-selected=true]{color:var(--txt);background:color-mix(in srgb,var(--tabc) 20%,var(--panel));border-color:color-mix(in srgb,var(--tabc) 60%,var(--line));}

  /* ===== ホーム種目カード(大タップ領域) ===== */
  .pbar{height:6px;border-radius:3px;background:var(--panel2);margin:8px 0 16px;overflow:hidden;}
  .pbar i{display:block;height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}
  .xc{display:block;width:100%;text-align:left;border:1px solid var(--line);border-left:5px solid var(--muted2);border-radius:16px;background:var(--panel);margin-bottom:12px;padding:16px;color:var(--txt);position:relative;}
  .xc:active{background:var(--panel2);}
  .xc.next{border-left-color:var(--accent);border-color:color-mix(in srgb,var(--accent) 45%,var(--line));background:color-mix(in srgb,var(--accent) 6%,var(--panel));}
  .xc.done{border-left-color:var(--up);opacity:.82;}
  .xc.part{border-left-color:var(--accent);}
  .xc .nm{font-weight:800;font-size:1.08rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .xc .st{position:absolute;top:14px;right:14px;font-size:.78rem;font-weight:800;}
  .xc .sub{margin-top:6px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
  .badge{font-size:.62rem;font-weight:800;color:var(--accent);background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:2px 6px;}
  .tag{font-size:.62rem;font-weight:700;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:2px 6px;}
  .chip{font-size:.76rem;font-weight:600;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:4px 9px;display:inline-flex;gap:5px;align-items:center;}
  .chip .k{font-size:.6rem;font-weight:700;color:var(--muted);}
  .cpv{margin-top:4px;width:100%;border:none;background:none;color:var(--muted);text-align:left;padding:0;}
  .copybtn{margin-top:12px;width:100%;height:52px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-weight:800;font-size:.92rem;}
  .editbtn{margin-left:auto;border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:10px 16px;color:var(--txt);font-weight:700;font-size:.85rem;}
  .locchip{display:inline-flex;align-items:center;max-width:100%;min-height:44px;padding:0 16px;margin:-6px 0 14px;border-radius:999px;border:1px dashed var(--line);background:none;color:var(--muted);font-weight:700;font-size:.85rem;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .locchip.set{border-style:solid;color:var(--txt);background:var(--panel);}
  .dh{display:flex;align-items:flex-start;gap:10px;}

  /* ===== フルスクリーン記録モード ===== */
  #wk{position:fixed;inset:0;z-index:50;background:var(--bg);display:none;flex-direction:column;max-width:520px;margin:0 auto;padding:calc(10px + env(safe-area-inset-top)) 18px calc(14px + env(safe-area-inset-bottom));overflow-y:auto;}
  #wk.show{display:flex;}
  .wk-top{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .wk-x{width:48px;height:48px;border-radius:14px;background:var(--panel);border:1px solid var(--line);color:var(--muted);font-size:18px;font-weight:800;flex:0 0 auto;}
  .wk-name{flex:1;font-weight:800;font-size:1.05rem;line-height:1.3;}
  /* セット一覧: 常に3行見える高さで内部スクロール(下の入力・ボタンと重ならない) */
  .wk-sets{display:flex;flex-direction:column;margin:10px 0 4px;flex:0 0 auto;max-height:156px;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-right:2px;}
  .wk-sets::-webkit-scrollbar{width:3px;}
  .wk-sets::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px;}
  .srw{display:flex;align-items:center;gap:10px;height:48px;padding:0 4px 0 14px;border-radius:12px;background:var(--panel);border:1px solid var(--line);}
  .srw .sl{font-weight:800;font-size:.8rem;color:var(--muted2);min-width:58px;}
  .srw .sv{font-weight:700;font-size:.92rem;}
  .srw.cur{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,var(--panel));}
  .srw.cur .sl{color:var(--accent);}
  .srw.ok .sl{color:var(--up);}
  .srw .xdel{margin-left:auto;width:44px;height:44px;background:none;border:none;color:var(--muted2);font-size:15px;flex:0 0 auto;}
  .hbtn{width:42px;height:42px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:15px;flex:0 0 auto;}
  /* ===== 履歴(Log) ===== */
  .hcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;}
  .hrow{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;color:var(--txt);padding:15px 14px;text-align:left;}
  .hrow:active{background:var(--panel2);}
  .hdate{font-weight:900;font-size:1.1rem;font-variant-numeric:tabular-nums;flex:0 0 auto;}
  .hwd{color:var(--muted2);font-size:.74rem;font-weight:700;flex:0 0 auto;}
  .hbadges{flex:1;display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end;}
  .hgrp{border-top:1px solid var(--line);padding:2px 14px 10px;}
  .hgl{font-size:.7rem;font-weight:800;letter-spacing:.08em;margin:10px 0 2px;}
  .hex{border-top:1px solid var(--line);}
  .hex:first-of-type{border-top:none;}
  .hexrow{display:flex;align-items:center;gap:6px;}
  .hexname{flex:1;min-width:0;display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--txt);padding:11px 0;text-align:left;font-weight:700;font-size:.9rem;}
  .hxnm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .hsets{padding:0 0 10px 18px;}
  .hset{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;margin-bottom:4px;border-radius:8px;background:var(--panel2);font-size:.84rem;color:var(--muted);}
  .hset b{color:var(--txt);font-weight:700;font-variant-numeric:tabular-nums;}
  /* 前回比バッジ */
  .diffb{display:inline-block;font-size:.7rem;font-weight:800;border-radius:6px;padding:2px 6px;vertical-align:middle;}
  .diffb.up{color:var(--up);background:#16291c;}
  .diffb.down{color:var(--down);background:#2a1715;}
  .diffb.eq{color:var(--muted2);background:var(--panel2);}
  .sdif{font-size:.72rem;font-weight:800;margin-left:8px;}
  .sdif.up{color:var(--up);}.sdif.down{color:var(--down);}
  .wdiff{font-weight:800;font-size:.82rem;margin-left:6px;}
  /* セット追加行 */
  .addrow{height:42px;border-radius:12px;border:1px dashed var(--line);background:none;color:var(--muted);font-weight:800;font-size:.85rem;width:100%;flex:0 0 auto;}
  /* Info タイル */
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .stile{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:13px 14px;text-align:left;color:var(--txt);position:relative;}
  .stile .tl{font-size:.64rem;font-weight:800;letter-spacing:.14em;color:var(--muted);}
  .stile .tv{font-size:1.65rem;font-weight:900;font-variant-numeric:tabular-nums;line-height:1.25;margin-top:2px;}
  .stile .tv small{font-size:.78rem;color:var(--muted);font-weight:700;}
  .stile.total{background:color-mix(in srgb,var(--accent) 10%,var(--panel));border-color:color-mix(in srgb,var(--accent) 40%,var(--line));}
  .stile .diffb{position:absolute;top:12px;right:12px;}
  .rngs{display:flex;gap:6px;margin:0 0 10px;}
  .rng{flex:1;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-weight:800;font-size:.8rem;}
  .rng.on{background:var(--accent);border-color:var(--accent);color:#0d0e11;}
  /* 左スワイプ削除 */
  .swp{position:relative;margin-bottom:12px;}
  .swp>*:first-child{position:relative;z-index:1;margin-bottom:0!important;width:100%;}
  .swp::after{content:'🗑 削除';position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;background:color-mix(in srgb,var(--down) 75%,#000);border-radius:16px;color:#fff;font-weight:800;font-size:.9rem;z-index:0;}
  .swp.arm::after{background:var(--down);}
  .swp.s{margin-bottom:6px;}
  .swp.s::after{border-radius:12px;padding-right:16px;font-size:.8rem;}
  /* 入力エリア: 伸縮させず自然な高さで積む(余白は上下autoマージンで配分=重なり防止) */
  .wk-mid{flex:0 0 auto;display:flex;flex-direction:column;margin-top:auto;margin-bottom:auto;padding:6px 0;}
  /* 縦が短い端末ではさらに少し縮める(セット3行は維持) */
  @media(max-height:700px){
    .stp button.pm{height:54px;width:56px;font-size:24px;}
    .stp .val{height:54px;}
    .stp .val .n{font-size:26px;line-height:54px;}
    .wk-done{height:50px;font-size:1rem;}
    .wk-actions button{height:44px;}
    .wk-memo{height:38px;}
  }
  .wk-prev{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:6px;}
  .wk-prev b{color:var(--txt);}
  .stp{display:flex;align-items:center;gap:10px;margin:6px 0;}
  .stp .lb{width:38px;text-align:center;color:var(--muted);font-size:.74rem;font-weight:700;flex:0 0 auto;}
  .stp button.pm{width:64px;height:62px;border-radius:14px;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-size:28px;font-weight:800;flex:0 0 auto;}
  .stp button.pm:active{background:var(--panel2);border-color:var(--accent);}
  .stp .val{flex:1;height:62px;border-radius:14px;background:var(--panel2);border:2px solid var(--line);display:flex;align-items:baseline;justify-content:center;gap:4px;color:var(--txt);}
  .stp .val .n{font-size:30px;font-weight:900;font-variant-numeric:tabular-nums;line-height:62px;}
  .stp .val .u{font-size:.74rem;color:var(--muted);font-weight:700;}
  .stp .val input{width:100%;height:100%;background:none;border:none;color:var(--txt);font-size:28px;font-weight:900;text-align:center;font-family:inherit;}
  .stp .val input:focus{outline:none;}
  .wk-plates{text-align:center;color:var(--muted2);font-size:.74rem;min-height:1.1em;margin:0 0 2px;}
  .wk-done{width:100%;height:56px;border-radius:16px;border:none;background:var(--accent);color:#0d0e11;font-weight:900;font-size:1.08rem;margin-top:8px;box-shadow:0 4px 16px color-mix(in srgb,var(--accent) 30%,transparent);flex:0 0 auto;}
  .wk-done:active{transform:scale(.985);}
  .wk-actions{display:flex;gap:8px;margin-top:8px;flex:0 0 auto;}
  .wk-actions button{flex:1;height:48px;border-radius:12px;font-weight:800;font-size:.9rem;}
  .wk-save2{background:var(--panel);border:1px solid var(--line);color:var(--txt);}
  .wk-del2{background:none;border:1px solid #5a2a28;color:var(--down);}
  .wk-memo{width:100%;height:42px;margin-top:8px;border-radius:12px;background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:0 12px;font-size:13px;font-family:inherit;}

  /* ===== 休憩フルスクリーン ===== */
  .rest-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
  .rest-ring{position:relative;width:230px;height:230px;}
  .rest-ring .in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
  .rest-t{font-size:56px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1.05;}
  .rest-l{color:var(--muted);font-size:.82rem;font-weight:700;}
  #wk.over .rest-t{color:var(--up);}
  .rest-next{width:100%;height:76px;border-radius:20px;border:none;background:var(--panel2);color:var(--txt);border:1px solid var(--line);font-weight:900;font-size:1.15rem;margin-top:14px;}
  #wk.over .rest-next{background:var(--up);color:#0d0e11;border:none;box-shadow:0 6px 24px color-mix(in srgb,var(--up) 35%,transparent);}
  .rest-adj{display:flex;gap:10px;width:100%;margin-top:10px;}
  .rest-adj button{flex:1;height:54px;border-radius:14px;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-weight:800;font-size:.95rem;}
  .flash{animation:fl .5s ease 3;}
  @keyframes fl{0%,100%{background:var(--bg);}50%{background:#233020;}}

  /* ===== 共通カード・部品 ===== */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px;}
  .card h3{margin:0 0 9px;font-size:.98rem;font-weight:800;}
  .head{display:flex;align-items:center;gap:8px;padding:13px;}
  .chev{color:var(--muted2);}
  .btn{flex:1;height:52px;border-radius:12px;border:none;font-weight:800;font-size:.95rem;background:var(--accent);color:#0d0e11;}
  .btn.g{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:0 14px;}
  .saverow{display:flex;gap:8px;margin-top:8px;}
  .danger{width:100%;background:none;border:1px solid #5a2a28;color:var(--down);border-radius:10px;padding:13px;font-weight:700;}
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .wd{border-radius:9px;padding:8px 2px;text-align:center;background:var(--panel2);border:1px solid var(--line);}
  .wd .w{font-size:.62rem;color:var(--muted);font-weight:700;}
  .wd .n{font-size:.8rem;font-weight:800;margin-top:2px;}
  .wd.rest .n{color:var(--muted2);}
  .wd.today{outline:2px solid var(--accent);}
  .pill{display:inline-flex;align-items:center;justify-content:center;height:44px;padding:0 15px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-weight:700;font-size:.85rem;margin:0 6px 8px 0;}
  .pill.on{background:var(--accent);border-color:var(--accent);color:#0d0e11;}
  .sec{color:var(--accent);font-size:.74rem;font-weight:800;margin:14px 0 7px;}
  .erow{display:flex;align-items:center;gap:4px;padding:9px 0;border-bottom:1px solid var(--line);}
  .erow .nm{flex:1;font-weight:700;font-size:.86rem;}
  .erow .ic{width:36px;height:40px;background:none;border:none;color:var(--muted);font-size:15px;font-weight:700;}
  .ins{display:flex;align-items:center;gap:8px;}
  .ins input{width:80px;height:54px;border-radius:12px;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-size:20px;font-weight:700;text-align:center;font-family:inherit;}
  .ins input:focus{outline:none;border-color:var(--accent);}
  .ins .u{color:var(--muted);font-size:.74rem;width:34px;}
  .sb{width:54px;height:54px;border-radius:12px;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-size:26px;font-weight:800;}
  .sw{display:inline-block;width:40px;height:40px;border-radius:50%;margin:0 9px 9px 0;border:3px solid transparent;box-shadow:0 0 0 1px var(--line);vertical-align:middle;}
  .sw.on{border-color:var(--txt);transform:scale(1.08);}

  /* ===== ボトムナビ ===== */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:25;display:flex;max-width:520px;margin:0 auto;background:var(--panel);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);}
  .nav button{flex:1;background:none;border:none;padding:11px 0 9px;color:var(--muted);position:relative;}
  .nav button.on::after{content:'';position:absolute;top:0;left:25%;right:25%;height:3px;background:var(--accent);border-radius:0 0 3px 3px;}
  .nav .ic{font-size:22px;opacity:.55;}
  .nav .lb{font-size:.68rem;font-weight:700;display:block;margin-top:2px;}
  .nav .lb:empty{display:none;}
  .nav button:has(.lb:empty) .ic{font-size:27px;line-height:1.5;}
  .nav button.on .ic{opacity:1;}
  .nav button.on .lb{color:var(--accent);font-weight:900;}

  /* ===== ミニタイマーバー ===== */
  #mini{position:fixed;left:0;right:0;bottom:calc(64px + env(safe-area-inset-bottom));z-index:26;max-width:520px;margin:0 auto;display:none;align-items:center;gap:10px;background:var(--panel2);border-top:1px solid var(--line);padding:10px 18px 8px;}
  #mini .mbar{position:absolute;left:0;top:0;right:0;height:4px;}
  #mini .mbar i{display:block;height:100%;background:var(--accent);transition:width 1s linear;}
  #mini.over .mbar i{background:var(--up);}
  #mini.show{display:flex;}
  #mini .mt{flex:1;font-weight:800;font-variant-numeric:tabular-nums;font-size:.95rem;color:var(--accent);}
  #mini.over .mt{color:var(--up);}
  #mini .mp,#mini .mx{width:44px;height:44px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-size:14px;font-weight:800;flex:0 0 auto;}
  body.mini-on .app{padding-bottom:calc(140px + env(safe-area-inset-bottom));}

  /* ===== シート・トースト ===== */
  .ov{position:fixed;inset:0;background:#000b;z-index:60;display:none;align-items:flex-end;}
  .ov.show{display:flex;}
  .sheet{width:100%;max-width:520px;margin:0 auto;background:var(--bg);border-radius:22px 22px 0 0;padding:18px;max-height:92vh;overflow:auto;}
  #toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(10px);background:var(--txt);color:#0d0e11;font-weight:800;font-size:.86rem;padding:12px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:.25s;z-index:70;max-width:88%;text-align:center;}
  #toast.show{opacity:1;transform:translateX(-50%);}
  #toast.act{pointer-events:auto;}
  #toast .undo{margin-left:10px;background:none;border:none;color:#0d0e11;font-weight:900;font-size:.86rem;text-decoration:underline;padding:4px;}
  .a2hs{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid color-mix(in srgb,var(--accent) 40%,var(--line));border-radius:12px;padding:10px 12px;margin-bottom:12px;font-size:.8rem;font-weight:700;color:var(--txt);}
  .a2hs button{background:none;border:none;color:var(--muted2);font-size:15px;padding:4px 6px;flex:0 0 auto;}
  .timer .big{font-size:54px;font-weight:800;font-variant-numeric:tabular-nums;text-align:center;margin:6px 0 0;}
  button,.pill,.tab,.sb,input{touch-action:manipulation;}
  input[type=text],input[type=number]{font-family:inherit;}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}

function big3Latest(k){const a=BIG3[k];return a&&a.length?a[a.length-1].kg:null;}
function repMid(sr){const p=String(sr).split('×')[1]||'';const ns=(p.match(/\d+/g)||[]).map(Number);if(!ns.length)return 10;return ns.length>1?(ns[0]+ns[1])/2:ns[0];}
function repLow(sr){const p=String(sr).split('×')[1]||'';const ns=(p.match(/\d+/g)||[]).map(Number);return ns.length?ns[0]:null;}
function rirMid(r){const ns=(String(r).match(/\d+/g)||[]).map(Number);if(!ns.length)return 1;return ns.length>1?(ns[0]+ns[1])/2:ns[0];}
// 目標レップ+RIRで挙げられる重量をEpley式(1RM=w×(1+reps/30))の逆算で推定
function suggestW(e){
  const[name,sr,rir,,,eq]=e;
  if(eq==='bw')return null;
  const c=EXCOEF[name];if(!c)return null;
  const max=big3Latest(c[0]);if(!max)return null;
  const cap=repMid(sr)+rirMid(rir);
  const w=max*c[1]/(1+cap/30);
  const step=EQ_STEP[eq]??2.5;
  return Math.max(step,Math.round(w/step)*step);
}

/* ====== ユーティリティ ====== */
const exKey=(d,n)=>d+'|'+n;
const setCount=s=>{const m=s.match(/^\s*(\d+)/);return m?+m[1]:3;};
const totalSets=ex=>ex.reduce((n,e)=>n+setCount(e[1]),0);
const vol=sets=>sets.reduce((v,s)=>(s&&s.w!=null&&s.r!=null)?v+s.w*s.r:v,0);
const fmtW=w=>w==null?'':(Number.isInteger(w)?String(w):w.toFixed(1));
const clone=o=>JSON.parse(JSON.stringify(o));
function todayStr(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
// 同名種目は全メニュー横断で集約(胸の日と腕の日に同じ種目があっても記録が繋がる)
function entriesByName(name){
  const out=[];
  Object.keys(LOGS).forEach(k=>{const i=k.indexOf('|');if(k.slice(i+1)===name)out.push(...LOGS[k]);});
  return out.sort((a,b)=>a.date.localeCompare(b.date));
}
function prevSession(d,n){const t=todayStr(),es=entriesByName(n).filter(e=>e.date<t);return es.length?es[es.length-1]:null;}
function todaySession(d,n){const h=LOGS[exKey(d,n)]||[],t=todayStr();return h.find(s=>s.date===t)||null;}
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const topW=sets=>Math.max(0,...sets.filter(s=>s.w!=null).map(s=>s.w));
function bestSet(sets){let b=null;sets.forEach(s=>{if(s.w==null&&s.r==null)return;if(!b||(s.w??0)>(b.w??0)||((s.w??0)===(b.w??0)&&(s.r??0)>(b.r??0)))b=s;});return b;}
function prevBefore(dk,name,date){const es=entriesByName(name).filter(e=>e.date<date);return es.length?es[es.length-1]:null;}

      </div></button></div>`;
  }
  const prevTxt=prev
    ?`前回 <b style="color:var(--txt)">${prev.sets.filter(s=>s.w!=null||s.r!=null).map(s=>`${s.w!=null?fmtW(s.w):'–'}×${s.r!=null?s.r:'–'}`).join(' / ')}</b>`
    :(suggestW(e)?`推奨 <b style="color:var(--accent)">${fmtW(suggestW(e))}kg</b>(BIG3から算出)`:'初めての種目');
  return `<div class="xc ${isNext?'next':''}" onclick="openWorkout('${day.key}',${idx})" role="button" tabindex="0">
    ${isNext?`<span class="st" style="color:var(--accent)">▶ 次はコレ</span>`:''}
    <div class="nm">${esc(name)} ${badges}</div>
    <div class="sub"><span class="chip"><span class="k">SET</span>${sr}</span><span class="chip"><span class="k">休憩</span>${rest}</span></div>
    <div class="cpv">${prevTxt}${MEMO[exKey(day.key,name)]?`<br>📝 ${esc(MEMO[exKey(day.key,name)])}`:''}</div>
    ${prev?`<button class="copybtn" onclick="event.stopPropagation();copyPrev('${day.key}',${idx})">⚡ 前回と同じ内容で記録(1タップ)</button>`:''}
  </div>`;
}

let tmpLoc=null;
function openLocSheet(){
  tmpLoc=clone(LOC[todayStr()]||{name:'',lat:null,lng:null});
  renderLocSheet();showSheet();
}
// 過去に使った場所名(新しい順・重複なし)
function pastPlaces(){
  const seen=new Set(),out=[];
  Object.keys(LOC).sort().reverse().forEach(d=>{
    const p=LOC[d],n=(p.name||'').trim();
    if(n&&!seen.has(n)){seen.add(n);out.push({name:n,lat:p.lat,lng:p.lng});}
  });
  return out.slice(0,8);
}
function renderLocSheet(){
  const past=pastPlaces();
  const mapLink=tmpLoc.lat!=null?`https://www.google.com/maps?q=${tmpLoc.lat},${tmpLoc.lng}`:null;
  document.getElementById('sheet').innerHTML=`
    <h3 style="margin:0 0 4px">📍 今日の場所</h3>
    <p class="pv" style="margin:0 0 8px">どこで筋トレしたかをメモします(1日1件)。</p>
    ${past.length?`<div class="sec">前に行った場所(タップで選択)</div>
      <div>${past.map(p=>`<span class="pill ${tmpLoc.name===p.name?'on':''}" onclick="locPick(this.textContent)">${esc(p.name)}</span>`).join('')}</div>`:''}
    <div class="sec">場所の名前(手入力もOK)</div>
    <input type="text" id="locName" value="${esc(tmpLoc.name||'')}" oninput="tmpLoc.name=this.value" maxlength="40" placeholder="例: ゴールドジム○○店 / 自宅"
      style="width:100%;height:48px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:0 14px;font-size:15px;font-weight:700">
    <div class="sec">GPS(現在地)</div>
    <button class="btn g" id="gpsBtn" style="width:100%;height:52px" onclick="locGPS()">📡 現在地を取得して保存する</button>
    <div class="pv" id="gpsInfo" style="margin-top:8px;min-height:1.2em">${tmpLoc.lat!=null
      ?`✓ 取得済み(${(+tmpLoc.lat).toFixed(4)}, ${(+tmpLoc.lng).toFixed(4)}) <a href="${mapLink}" target="_blank" rel="noopener" style="color:var(--accent)">地図で確認</a> ・ <a href="javascript:void(0)" onclick="tmpLoc.lat=null;tmpLoc.lng=null;renderLocSheet()" style="color:var(--down)">座標を消す</a>`
      :'未取得(名前だけの保存もできます)'}</div>
    <div class="saverow" style="margin-top:16px"><button class="btn" onclick="locSave()">保存</button><button class="btn g" onclick="closeSheet()">取消</button></div>
    ${LOC[todayStr()]?`<button class="danger" style="margin-top:12px" onclick="locDel()">今日の場所を削除</button>`:''}`;
}
function locPick(n){tmpLoc.name=n;renderLocSheet();}
function locGPS(){
  if(!navigator.geolocation){toast('この端末では位置情報が使えません');return;}
  const btn=document.getElementById('gpsBtn');btn.disabled=true;btn.textContent='📡 取得中…';
  navigator.geolocation.getCurrentPosition(
    pos=>{tmpLoc.lat=Math.round(pos.coords.latitude*1e5)/1e5;tmpLoc.lng=Math.round(pos.coords.longitude*1e5)/1e5;vib();renderLocSheet();},
    err=>{toast(err.code===1?'位置情報が許可されていません(設定から許可してください)':'現在地を取得できませんでした');renderLocSheet();},
    {enableHighAccuracy:false,timeout:10000,maximumAge:60000});
}
function locSave(){
  const name=(tmpLoc.name||'').trim();
  if(!name&&tmpLoc.lat==null){toast('名前かGPSのどちらかを入れてください');return;}
  LOC[todayStr()]={name,lat:tmpLoc.lat,lng:tmpLoc.lng};
  saveLocStore();closeSheet();renderHome();toast('場所を記録しました ✓');
}
function locDel(){
  delete LOC[todayStr()];
  saveLocStore();closeSheet();renderHome();toast('今日の場所を削除しました');
}
function locLabel(date){
  const p=LOC[date];if(!p)return '';
  return p.name||(p.lat!=null?'GPSのみ':'');
}

function copyPrev(dk,idx){
  const day=PROGRAM.find(d=>d.key===dk),e=day.ex[idx];
  const prev=prevSession(dk,e[0]);if(!prev)return;
  const k=exKey(dk,e[0]),hist=LOGS[k]||[],date=todayStr();
  const en={date,sets:clone(prev.sets)};
  const li=hist.findIndex(x=>x.date===date);
  if(li>=0)hist[li]=en;else hist.push(en);
  LOGS[k]=hist;saveLogs();vib();
  toast('前回と同じ内容で記録しました ✓');renderHome();
}

/* ====== フルスクリーン記録モード ====== */
let W=null; // {dk,idx,setIdx,sets,confirmed,sug,phase:'input'|'rest',restNext,editW,editR}
function openWorkout(dk,idx,isEdit){
  const day=PROGRAM.find(d=>d.key===dk);if(!day||!day.ex[idx])return;
  const e=day.ex[idx];
  const prev=prevSession(dk,e[0]),today=todaySession(dk,e[0]);
  // 修正モードでは記録済みのセット数(削除後の数)をそのまま使う
  const n=(isEdit&&today&&today.sets.length)?today.sets.length:setCount(e[1]);
  const sug=prev?null:suggestW(e);
  const rlow=prev?null:repLow(e[1]);
  const confirmed=new Set();
  const sets=Array.from({length:n},(_,i)=>{
    const tv=today&&today.sets[i]?today.sets[i]:null;
    const pv=prev&&prev.sets[i]?prev.sets[i]:null;
    if(isEdit&&tv&&(tv.w!=null||tv.r!=null))confirmed.add(i);
    return{
      w:tv&&tv.w!=null?tv.w:(pv&&pv.w!=null?pv.w:sug),
      r:tv&&tv.r!=null?tv.r:(pv&&pv.r!=null?pv.r:rlow)
    };
  });
  let setIdx=0;
  for(let i=0;i<n;i++)if(!confirmed.has(i)){setIdx=i;break;}
  // 日付はセッション開始時に固定(深夜0時を跨いでも記録が分裂しない)
  W={dk,idx,setIdx,sets,confirmed,sug,phase:'input',date:todayStr()};
  document.documentElement.style.setProperty('--accent',day.color);
  wlOn();
  renderWk();
  document.getElementById('wk').classList.add('show');
}
function closeWk(){
  W=null;wlOff();
  document.getElementById('wk').classList.remove('show');
  document.getElementById('wk').classList.remove('over');
  render();
}
function wkDay(){return PROGRAM.find(d=>d.key===W.dk);}
function wkEx(){return wkDay().ex[W.idx];}

function renderWk(){
  if(!W)return;
  const day=wkDay(),e=wkEx();
  const[name,sr,rir,rest,tagv,eq]=e,n=W.sets.length;

  el.classList.remove('over');
  const s=W.sets[W.setIdx]||{};
  const prev=prevSession(W.dk,name);
  const pv=prev&&prev.sets[W.setIdx]?prev.sets[W.setIdx]:null;
  const step=EQ_STEP[eq]??2.5;
  const rows=W.sets.map((x,i)=>{
    const cls=i===W.setIdx?'cur':(W.confirmed.has(i)?'ok':'');
    const v=W.confirmed.has(i)?`${x.w!=null?fmtW(x.w)+'kg':'–'} × ${x.r!=null?x.r+'回':'–'}`:(i===W.setIdx?'入力中':'未入力');
    return `<div class="swp s" data-del="set:0:${i}"><div class="srw ${cls}" onclick="wkGoto(${i})"><span class="sl">SET${i+1}${W.confirmed.has(i)?' ✓':''}</span><span class="sv" ${W.confirmed.has(i)?'':'style="color:var(--muted2);font-weight:600;font-size:.8rem"'}>${v}</span><button class="xdel" onclick="event.stopPropagation();wkDelSet(${i})">✕</button></div></div>`;
  }).join('');
  const remaining=W.sets.filter((_,i)=>i!==W.setIdx&&!W.confirmed.has(i)).length;
  const isFinal=remaining===0;
  const prevTxt=pv?`前回 <b>${fmtW(pv.w)||'–'}kg × ${pv.r??'–'}回</b>`:(W.sug?`推奨 <b style="color:var(--accent)">${fmtW(W.sug)}kg</b>(BIG3から算出)`:'前回記録なし');
  el.innerHTML=`
    <div class="wk-top">
      <button class="wk-x" onclick="closeWk()">✕</button>

      <span style="font-size:1.4rem;font-weight:900;color:var(--accent);flex:0 0 auto">${W.setIdx+1}<span style="font-size:.85rem;color:var(--muted)">/${n}</span></span>
    </div>
    <div class="wk-sets">${rows}<button class="addrow" onclick="wkAddSet()">＋ セット追加</button></div>
    <div class="wk-mid">
      <div class="wk-prev">${prevTxt}<span id="wkDiff">${wkDiffTxt()}</span></div>
      <div class="stp">
        <span class="lb">重量<br>kg</span>
        <button class="pm" onclick="wkAdj('w',${-step})">−</button>
        <div class="val" id="wv" onclick="wkEditNum('w')"><span class="n">${s.w!=null?fmtW(s.w):'—'}</span><span class="u">kg</span></div>
        <button class="pm" onclick="wkAdj('w',${step})">＋</button>
      </div>
      ${eq==='bb'?`<div class="wk-plates" id="wkPlates">${plateStr(s.w,eq)}</div>`:''}
      <div class="stp">
        <span class="lb">回数</span>
        <button class="pm" onclick="wkAdj('r',-1)">−</button>
        <div class="val" id="rv" onclick="wkEditNum('r')"><span class="n">${s.r!=null?s.r:'—'}</span><span class="u">回</span></div>
        <button class="pm" onclick="wkAdj('r',1)">＋</button>
      </div>

    <button class="wk-done" onclick="wkConfirm()">✓ SET ${W.setIdx+1} 完了</button>
    <div class="wk-actions">
      <button class="wk-save2" onclick="wkFinishEarly()">💾 保存して終了</button>
      <button class="wk-del2" onclick="wkClearToday()">🗑 全削除</button>
    </div>
    <input class="wk-memo" type="text" value="${esc(MEMO[exKey(W.dk,name)]||'')}" placeholder="📝 メモ" maxlength="60" oninput="setMemoCur(this.value)">`;
  bindSwipes(el);

function wkAdj(k,d){
  if(!W)return;
  const s=W.sets[W.setIdx];
  if(k==='w'){let v=s.w!=null?s.w:0;v=Math.max(0,Math.round((v+d)*4)/4);s.w=v;}
  else{let v=s.r!=null?s.r:0;v=Math.max(0,Math.round(v+d));s.r=v;}
  vib(8);
  // 数値部分だけ更新(再描画で±連打が途切れないように)
  const el=document.getElementById(k==='w'?'wv':'rv');
  if(el&&el.querySelector('.n'))el.querySelector('.n').textContent=k==='w'?(s.w!=null?fmtW(s.w):'—'):(s.r!=null?s.r:'—');
  const p=document.getElementById('wkPlates');if(p&&k==='w')p.textContent=plateStr(s.w,wkEx()[5]);
  const df=document.getElementById('wkDiff');if(df)df.innerHTML=wkDiffTxt();
}
// 入力中の値と前回同セットの差分(重量優先、同重量なら回数)
function wkDiffTxt(){
  if(!W)return '';
  const e=wkEx(),prev=prevSession(W.dk,e[0]);
  const pv=prev&&prev.sets[W.setIdx]?prev.sets[W.setIdx]:null;
  const s=W.sets[W.setIdx]||{};
  if(!pv||pv.w==null||s.w==null)return '';
  const d=Math.round((s.w-pv.w)*10)/10;
  if(d>0)return `<span class="wdiff" style="color:var(--up)">▲ +${fmtW(d)}kg</span>`;
  if(d<0)return `<span class="wdiff" style="color:var(--down)">▼ ${fmtW(d)}kg</span>`;
  const dr=(s.r??0)-(pv.r??0);
  if(dr>0)return `<span class="wdiff" style="color:var(--up)">▲ +${dr}回</span>`;
  if(dr<0)return `<span class="wdiff" style="color:var(--down)">▼ ${dr}回</span>`;
  return `<span class="wdiff" style="color:var(--muted2)">±0</span>`;
}
// 調子が良い日にセットを増やす(直近セットの値を引き継ぎ)
function wkAddSet(){
  if(!W||W.phase!=='input')return;
  const last=W.sets[W.sets.length-1]||{w:null,r:null};
  W.sets.push({w:last.w,r:last.r});
  vib();renderWk();
  const sc=document.querySelector('.wk-sets');if(sc)sc.scrollTop=sc.scrollHeight;
}
function wkEditNum(k){
  if(!W)return;
  const el=document.getElementById(k==='w'?'wv':'rv');if(!el||el.querySelector('input'))return;
  const s=W.sets[W.setIdx];
  const cur=k==='w'?(s.w!=null?fmtW(s.w):''):(s.r!=null?String(s.r):'');
  el.innerHTML=`<input inputmode="${k==='w'?'decimal':'numeric'}" value="${cur}">`;
  const inp=el.querySelector('input');
  inp.focus();inp.select&&inp.select();
  const commit=()=>{
    const v=parseFloat(inp.value);
    if(k==='w')s.w=isNaN(v)?null:Math.max(0,v);
    else s.r=isNaN(v)?null:Math.max(0,Math.round(v));
    renderWk();
  };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')inp.blur();});
}
function wkGoto(i){
  if(!W||W.phase!=='input')return;
  W.setIdx=i;renderWk();
}
// セット確定ごとに即保存(途中でアプリを閉じても残る)
function wkSave(){
  if(!W)return;
  const e=wkEx(),k=exKey(W.dk,e[0]),date=W.date||todayStr();
  const sets=W.sets.map((s,i)=>W.confirmed.has(i)?{w:s.w,r:s.r}:{w:null,r:null});
  const hist=LOGS[k]||[],li=hist.findIndex(x=>x.date===date);
  if(!sets.some(s=>s.w!=null||s.r!=null)){
    // 有効なセットが1つもなくなったら今日のエントリごと削除
    if(li>=0){hist.splice(li,1);if(hist.length)LOGS[k]=hist;else delete LOGS[k];saveLogs();}
    return;
  }
  const en={date,sets};
  if(li>=0)hist[li]=en;else hist.push(en);
  LOGS[k]=hist;saveLogs();
}
// セット削除: 後ろのセットを繰り上げてセット数を1減らす
function wkDelSet(i){
  if(!W||W.phase!=='input')return;
  if(W.sets.length<=1){wkClearToday();return;}
  W.sets.splice(i,1);
  const nc=new Set();
  W.confirmed.forEach(x=>{if(x<i)nc.add(x);else if(x>i)nc.add(x-1);});
  W.confirmed=nc;
  if(W.setIdx>i)W.setIdx--;
  if(W.setIdx>=W.sets.length)W.setIdx=W.sets.length-1;
  wkSave();vib();
  toast(`SET ${i+1} を削除しました(以降のセットを繰り上げ)`);
  renderWk();
}
// この種目の今日の記録を一括削除
function wkClearToday(){
  if(!W)return;
  const e=wkEx(),k=exKey(W.dk,e[0]),date=W.date||todayStr();
  const en=(LOGS[k]||[]).find(s=>s.date===date);
  if(LOGS[k]){LOGS[k]=LOGS[k].filter(s=>s.date!==date);if(!LOGS[k].length)delete LOGS[k];saveLogs();}
  vib();closeWk();
  if(en)toastUndo('記録を削除',()=>{restoreEntry(k,en);render();});
  else toast('記録を削除しました');
}
// ホームの完了カードから種目の今日の記録を一括削除
function delTodayEx(dk,idx){
  const day=PROGRAM.find(d=>d.key===dk);if(!day||!day.ex[idx])return;
  const k=exKey(dk,day.ex[idx][0]),date=todayStr();
  const en=(LOGS[k]||[]).find(s=>s.date===date);
  if(LOGS[k]){LOGS[k]=LOGS[k].filter(s=>s.date!==date);if(!LOGS[k].length)delete LOGS[k];saveLogs();}
  vib();renderHome();
  if(en)toastUndo('記録を削除',()=>{restoreEntry(k,en);renderHome();});
}

/* ====== 左スワイプで削除 ====== */
function bindSwipes(root){
  if(!root)return;
  root.querySelectorAll('.swp').forEach(w=>{
    const item=w.firstElementChild;
    let sx=0,sy=0,dx=0,drag=null;
    w.addEventListener('touchstart',ev=>{sx=ev.touches[0].clientX;sy=ev.touches[0].clientY;dx=0;drag=null;item.style.transition='none';},{passive:true});
    w.addEventListener('touchmove',ev=>{
      const tx=ev.touches[0].clientX-sx,ty=ev.touches[0].clientY-sy;
      if(drag===null){
        if(Math.abs(tx)>Math.abs(ty)+6)drag=true;
        else if(Math.abs(ty)>10)drag=false;
      }
      if(drag){dx=Math.min(0,tx);item.style.transform=`translateX(${dx}px)`;w.classList.toggle('arm',dx<-72);}
    },{passive:true});
    const end=()=>{
      item.style.transition='transform .18s';
      if(drag&&dx<-72){item.style.transform='translateX(-110%)';setTimeout(()=>swipeDelete(w.dataset.del),160);}
      else{item.style.transform='';w.classList.remove('arm');}
    };
    w.addEventListener('touchend',end);
    w.addEventListener('touchcancel',end);
  });
}
function swipeDelete(spec){
  if(!spec)return;
  const p=spec.split(':'),type=p[0];
  if(type==='ex')delTodayEx(p[1],+p[2]);
  else if(type==='set')wkDelSet(+p[2]);
}
function wkConfirm(){
  if(!W)return;
  W.confirmed.add(W.setIdx);
  wkSave();vib([30,40,30]);
  // 次の未確定セット
  const n=W.sets.length;let nx=-1;
  for(let i=W.setIdx+1;i<n;i++)if(!W.confirmed.has(i)){nx=i;break;}
  if(nx<0)for(let i=0;i<n;i++)if(!W.confirmed.has(i)){nx=i;break;}
  if(nx<0){wkAllDone();return;}
  // いま入れた値を次セットへ引き継ぎ
  const cur=W.sets[W.setIdx];
  if(cur.w!=null)W.sets[nx].w=cur.w;
  if(cur.r!=null)W.sets[nx].r=cur.r;
  W.restNext={type:'set',to:nx};
  wkStartRest();
}
function wkFinishEarly(){
  if(!W)return;
  // 現在表示中セットも値が入っていれば確定扱い
  const s=W.sets[W.setIdx];
  if(s.w!=null||s.r!=null)W.confirmed.add(W.setIdx);
  wkSave();
  wkAllDone(true,true);
}
function wkAllDone(skipRest,goHome){
  const day=wkDay(),e=wkEx();
  // 自己ベスト(推定1RM)判定
  const k=exKey(W.dk,e[0]),hist=LOGS[k]||[],date=W.date||todayStr();
  const e1=s2=>s2.w!=null&&s2.r?s2.w*(1+s2.r/30):0;
  const bestOf=ss=>Math.max(0,...ss.map(e1));
  const todayBest=bestOf(W.sets.filter((_,i)=>W.confirmed.has(i)));
  let prevBest=0;hist.forEach(h2=>{if(h2.date<date)prevBest=Math.max(prevBest,bestOf(h2.sets));});
  if(prevBest>0&&todayBest>prevBest+0.01){
    const r1=x=>Math.round(x*10)/10;
    toast(`🎉 自己ベスト更新! 推定1RM ${r1(todayBest)}kg(+${r1(todayBest-prevBest)})`,3200);
  }else toast('記録しました ✓');
  // 次の未記録種目
  const ni=day.ex.findIndex((e2,i2)=>i2!==W.idx&&!todaySession(W.dk,e2[0]));
  if(goHome){closeWk();return;}
  if(skipRest||!AUTOTIMER){ if(ni>=0){openWorkout(W.dk,ni);}else closeWk(); return; }
  W.restNext=ni>=0?{type:'ex',to:ni}:{type:'end'};
  wkStartRest();
}
function wkStartRest(){
  if(!AUTOTIMER){wkRestDone();return;}
  W.phase='rest';
  startRestTimer(restSecs(wkEx()[3]));
  renderWkRest();
}
function renderWkRest(){

  const R=104,CIRC=2*Math.PI*R;
  el.innerHTML=`
    <div class="wk-top">
      <button class="wk-x" onclick="wkRestDone(true)">✕</button>
      <div class="wk-name">${esc(e[0])}<div style="font-size:.72rem;color:var(--muted);font-weight:600">${nextLabel}</div></div>
    </div>
    <div class="rest-wrap" id="restWrap">
      <div class="rest-ring">
        <svg width="230" height="230" viewBox="0 0 230 230">
          <circle cx="115" cy="115" r="${R}" fill="none" stroke="var(--panel2)" stroke-width="13"/>
          <circle id="restArc" cx="115" cy="115" r="${R}" fill="none" stroke="${over?'var(--up)':'var(--accent)'}" stroke-width="13" stroke-linecap="round"
            stroke-dasharray="${(over?CIRC:CIRC*Math.max(0,1-tEl/tAlert)).toFixed(1)} ${CIRC.toFixed(1)}" transform="rotate(-90 115 115)"/>
        </svg>
        <div class="in">
          <div class="rest-l">${over?'✓ 休憩終了':'休憩中'}</div>
          <div class="rest-t" id="restT">${over?'+'+mmss(tEl-tAlert):mmss(tAlert-tEl)}</div>
          <div class="rest-l" id="restL2">${over?'':'/ '+mmss(tAlert)}</div>
        </div>
      </div>

      <div class="rest-adj">
        <button onclick="tAdjWk(-30)">−30秒</button>

    </div>`;
}
function tAdjWk(d){tAlert=Math.max(15,tAlert+d);tFired=tEl>=tAlert?tFired:false;updateMini();renderWkRest();}
function wkRestDone(exit){
  tReset();

  if(exit||nxt.type==='end'){closeWk();return;}

}

// バーベル(20kg)基準の片側プレート内訳
function plateStr(w,eq){
  if(eq!=='bb')return '';
  w=parseFloat(w);if(w==null||isNaN(w)||w<=0)return '';
  const bar=20;
  if(w<=bar)return 'バー(20kg)のみ/以下';
  let per=(w-bar)/2,out=[];
  for(const p of [20,15,10,5,2.5,1.25]){while(per>=p-0.001){out.push(p);per-=p;}}
  return `片側: ${out.join(' + ')||'—'}${per>0.01?' +端数':''}`;
}
function setMemoCur(v){
  if(!W)return;
  const e=wkEx(),k=exKey(W.dk,e[0]);
  v=(v||'').trim();if(v)MEMO[k]=v;else delete MEMO[k];
  saveMemoStore();
}

const BIG3_KEYS=['bench','squat','deadlift'];

const BIG3_SHORT={bench:'BENCH',squat:'SQUAT',deadlift:'DEADLIFT'};

let bwRange='3m';
function setBwRange(r){bwRange=r;renderBody();}
function bwFiltered(){
  const data=[...BW].sort((a,b)=>a.date.localeCompare(b.date));
  if(bwRange==='all')return data;
  const days=bwRange==='1m'?30:90;
  const c=new Date(Date.now()-days*864e5);
  const cs=`${c.getFullYear()}-${String(c.getMonth()+1).padStart(2,'0')}-${String(c.getDate()).padStart(2,'0')}`;
  return data.filter(d=>d.date>=cs);
}
function lineSvg(vals,color,Wd,H){
  const mn=Math.min(...vals),mx=Math.max(...vals),pad=(mx-mn)*0.15||1,lo=mn-pad,hi=mx+pad;
  const X=i=>15+i/(vals.length-1)*Wd,Y=v=>10+(1-(v-lo)/(hi-lo))*(H-30);
  return `<svg width="${Wd+30}" height="${H}" style="display:block;width:100%;overflow:visible">
    <text x="18" y="${Y(mx)-4}" fill="var(--muted2)" font-size="10">${fmtW(mx)}kg</text>
    <text x="18" y="${Y(mn)+12}" fill="var(--muted2)" font-size="10">${fmtW(mn)}kg</text>
    <polyline points="${vals.map((v,i)=>`${X(i)},${Y(v)}`).join(' ')}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>
    ${vals.map((v,i)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="${i===vals.length-1?4:2.5}" fill="${color}"/>`).join('')}</svg>`;
}

// トレ記録からBIG3の推定1RM(Epley)を算出
const B3_MATCH={bench:['ベンチプレス','バーベルベンチプレス'],squat:['バーベルスクワット','バックスクワット'],deadlift:['デッドリフト']};
function estB3(k){
  let best=0;
  B3_MATCH[k].forEach(n=>entriesByName(n).forEach(en=>en.sets.forEach(s=>{
    if(s.w!=null&&s.r)best=Math.max(best,s.w*(1+s.r/30));
  })));
  return best?Math.round(best*2)/2:null;
}
function addBw(){const v=parseFloat(document.getElementById('bwin').value);if(isNaN(v)||v<=0)return;
  const date=todayStr();BW=[...BW.filter(x=>x.date!==date),{date,kg:Math.round(v*10)/10}];saveBW();renderBody();toast('体重を記録 ✓');}

function big3Sheet(k){

function exportCsv(){
  const rows=[['日付','部位','種目','セット','重量kg','回数','場所','緯度','経度']];
  const locCols=date=>{const p=LOC[date];return p?[p.name||'',p.lat??'',p.lng??'']:['','',''];};
  PROGRAM.forEach(d=>d.ex.forEach(e=>(LOGS[exKey(d.key,e[0])]||[]).forEach(s=>s.sets.forEach((st,i)=>{if(st.w!=null||st.r!=null)rows.push([s.date,d.label,e[0],i+1,st.w??'',st.r??'',...locCols(s.date)]);}))));
  BW.forEach(b=>rows.push([b.date,'体重','体重','',b.kg,'','','','']));
  if(rows.length<2){toast('記録がありません');return;}

function dayMeta(k){const d=PROGRAM.find(x=>x.key===k);return d?{label:d.label,color:d.color}:{label:k,color:'var(--muted)'};}

function buildByDate(){
  const map={};
  Object.keys(LOGS).forEach(k=>{const i=k.indexOf('|'),dk=k.slice(0,i),name=k.slice(i+1);
    LOGS[k].forEach(s=>{(map[s.date]=map[s.date]||{});(map[s.date][dk]=map[s.date][dk]||[]).push({name,sets:s.sets});});});

}

function exProgress(dk,name){
  const h=(LOGS[exKey(dk,name)]||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const pts=h.map(en=>({date:en.date,tw:topW(en.sets),bs:bestSet(en.sets)})).filter(p=>p.tw>0&&p.bs);
  if(!pts.length){toast('重量の記録がありません');return;}
  const first=pts[0],last=pts[pts.length-1];

  let chart='';
  if(pts.length>=2){
    const Wd=Math.min(340,(document.querySelector('.app')||{clientWidth:340}).clientWidth-50),H=140;
    const ks=pts.map(p=>p.tw),mn=Math.min(...ks),mx=Math.max(...ks),pad=(mx-mn)*0.15||2.5,lo=mn-pad,hi=mx+pad;
    const X=i=>15+i/(pts.length-1)*Wd,Y=v=>10+(1-(v-lo)/(hi-lo))*(H-30);
    const pl=pts.map((p,i)=>`${X(i)},${Y(p.tw)}`).join(' ');

      ${pts.map((p,i)=>`<circle cx="${X(i)}" cy="${Y(p.tw)}" r="${i===pts.length-1?4:2.5}" fill="var(--accent)"/>`).join('')}</svg></div>`;
  }
  const rows=[...pts].reverse().map((p,i,a)=>{
    const nx=a[i+1];let sd='';

      sd=d>0?`<span class="diffb up">▲ +${fmtW(d)}</span>`:d<0?`<span class="diffb down">▼ ${fmtW(d)}</span>`:`<span class="diffb eq">±0</span>`;}

      <span class="pv" style="width:44px;flex:0 0 auto">${p.date.slice(5).replace('-','/')}</span>

  }).join('');

      ${pts.length>=2?`<span class="diffb ${gain>0?'up':gain<0?'down':'eq'}" style="font-size:.85rem">${gain>0?'▲ +':gain<0?'▼ ':'±'}${fmtW(Math.abs(gain))||0}kg</span><span class="pv">初回 ${fmtW(first.tw)}kg から</span>`:''}
    </div>

    <button class="btn g" style="width:100%;margin-top:14px" onclick="closeSheet()">閉じる</button>`;
  showSheet();
}

/* ====== 履歴の修正・削除 ====== */

  if(!LOGS[k].length)delete LOGS[k];

// 日付 → (タップ)種目一覧 → (タップ)セット詳細 の2段アコーディオン
function renderHistory(){
  document.getElementById('tabsWrap').innerHTML='';
  document.documentElement.style.setProperty('--accent','#f0a23b');
  const arr=buildByDate();
  let h=`<div class="eyebrow" style="color:var(--accent)">TRAINING LOG</div><h2>Log</h2>`;
  if(!arr.length){
    h+='<p style="color:var(--muted2);text-align:center;padding:30px 0">まだ記録がありません。<br>Memoタブで記録すると、ここに日付ごとに並びます。</p>';
    document.getElementById('main').innerHTML=h;return;
  }
  arr.forEach(({date,days})=>{
    const key='hd-'+date,open=expandedH.has(key);
    const[,m,d]=date.split('-').map(Number);
    let badges=Object.keys(days).map(dk=>{const meta=dayMeta(dk);
      return `<span class="badge" style="color:${meta.color};border-color:${meta.color}66">${esc(meta.label)}</span>`;}).join('');
    if(locLabel(date))badges+=`<span class="tag">📍 ${esc(locLabel(date))}</span>`;
    let body='';
    if(open){
      Object.keys(days).forEach(dk=>{
        const meta=dayMeta(dk);
        body+=`<div class="hgrp"><div class="hgl" style="color:${meta.color}">${esc(meta.label)}</div>`;
        days[dk].forEach(x=>{
          const k2=key+'|'+dk+'|'+x.name,xo=expandedHX.has(k2);
          const valid=x.sets.filter(s=>s.w!=null||s.r!=null);
          const prev=prevBefore(dk,x.name,date);
          const cw=topW(x.sets),pw=prev?topW(prev.sets):0;
          let db='';
          if(cw>0&&pw>0){const d=Math.round((cw-pw)*10)/10;
            db=d>0?`<span class="diffb up">▲ +${fmtW(d)}</span>`:d<0?`<span class="diffb down">▼ ${fmtW(d)}</span>`:`<span class="diffb eq">±0</span>`;}
          body+=`<div class="hex">
            <div class="hexrow">
              <button class="hexname" onclick="togHX('${escJs(k2)}')"><span class="chev" style="font-size:.68rem;width:12px;flex:0 0 auto">${xo?'▾':'▸'}</span>
                <span style="flex:1;min-width:0"><span class="hxnm" style="display:block">${esc(x.name)}</span>
                <span class="pv">${cw>0?`<b style="color:var(--txt)">${fmtW(cw)}kg</b> `:''}${db} ${valid.length}セット</span></span></button>
              <button class="hbtn" onclick="exProgress('${dk}','${escJs(x.name)}')">📈</button>
              <button class="hbtn" onclick="histEdit('${dk}','${escJs(x.name)}','${date}')">✎</button>
              <button class="hbtn" style="color:var(--down)" onclick="histDel('${dk}','${escJs(x.name)}','${date}')">🗑</button>
            </div>
            ${xo?`<div class="hsets">${(()=>{
              // 前回とセット数が違う場合は末尾同士で整列(ウォームアップ数の違いでズレない)
              const pvalid=prev?prev.sets.filter(s2=>s2.w!=null||s2.r!=null):[];
              const off=pvalid.length-valid.length;
              return valid.map((s,i)=>{
              const ps=(i+off)>=0?pvalid[i+off]:null;let sd='';
              if(ps&&s.w!=null&&ps.w!=null){const d2=Math.round((s.w-ps.w)*10)/10;
                if(d2>0)sd=`<span class="sdif up">+${fmtW(d2)}</span>`;
                else if(d2<0)sd=`<span class="sdif down">${fmtW(d2)}</span>`;
                else if(s.r!=null&&ps.r!=null&&s.r!==ps.r)sd=`<span class="sdif ${s.r>ps.r?'up':'down'}">${s.r>ps.r?'+':''}${s.r-ps.r}回</span>`;}
              return `<div class="hset"><span>SET ${i+1}</span><span><b>${s.w!=null?fmtW(s.w)+' kg':'–'} × ${s.r!=null?s.r+' 回':'–'}</b>${sd}</span></div>`;}).join('');})()}</div>`:''}
          </div>`;
        });
        body+='</div>';
      });
    }
    h+=`<div class="hcard"><button class="hrow" onclick="togH('${key}')">
      <span class="hdate">${m}/${d}</span><span class="hwd">${wdName(date)}</span>
      <span class="hbadges">${badges}</span><span class="chev">${open?'▾':'▸'}</span></button>${body}</div>`;
  });
  document.getElementById('main').innerHTML=h;
}

}
/* iOS Safariのタブ利用は7日間未使用でデータが消えるため、ホーム画面追加を促す */
function showA2HS(){
  try{
    if(localStorage.getItem('gym-a2hs-v1')==='1')return false;
    if(window.Capacitor)return false;
    const ios=/iP(hone|ad|od)/.test(navigator.userAgent);
    const standalone=navigator.standalone||matchMedia('(display-mode: standalone)').matches;
    return ios&&!standalone;
  }catch(e){return false;}
}
function dismissA2HS(){try{localStorage.setItem('gym-a2hs-v1','1');}catch(e){}renderHome();}
</script>
