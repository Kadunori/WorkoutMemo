<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0e11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MMate">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>MMate</title>
<style>
  :root{
    --bg:#0d0e11;--panel:#16181e;--panel2:#1d2027;--line:#2a2e37;
    --txt:#eceef1;--muted:#8c93a0;--muted2:#5f6671;--accent:#f0a23b;
    --up:#46c46e;--down:#ec6a5e;
    --chest:#e5645b;--back:#37b59e;--delts:#f0a23b;--legs:#9384ea;--arms:#5aa0e0;
    font-size:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--txt);overscroll-behavior-y:none;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .app{max-width:520px;margin:0 auto;padding-top:env(safe-area-inset-top);padding-bottom:calc(70px + env(safe-area-inset-bottom));display:flex;flex-direction:column;min-height:100dvh;}
  .eyebrow{font-size:.62rem;letter-spacing:.2em;color:var(--muted);font-weight:700;}
  h1{margin:.1em 0 0;font-size:1.25rem;font-weight:800;}
  .tabs{position:sticky;top:env(safe-area-inset-top);z-index:20;display:flex;gap:8px;overflow-x:auto;padding:10px 18px;background:rgba(13,14,17,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;min-height:40px;padding:0 15px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:7px;}
  .tab .pip{width:8px;height:8px;border-radius:50%;background:var(--tabc,var(--muted2));}
  .tab[aria-selected=true]{color:var(--txt);background:color-mix(in srgb,var(--tabc) 18%,var(--panel));border-color:color-mix(in srgb,var(--tabc) 55%,var(--line));}
  .tab[aria-selected=true] .pip{background:var(--tabc);}
  main{flex:1;padding:16px 18px 24px;}
  .seltag{font-size:.62rem;letter-spacing:.16em;color:var(--muted2);font-weight:700;padding:10px 18px 0;}
  .dh{display:flex;align-items:flex-start;gap:10px;}
  .dh .en{font-size:.66rem;font-weight:800;letter-spacing:.16em;}
  .dh h2{margin:.05em 0;font-size:1.5rem;font-weight:800;}
  .editbtn{margin-left:auto;border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:8px 14px;color:var(--txt);font-weight:700;font-size:.82rem;}
  .focus{color:var(--muted);font-size:.8rem;margin-top:4px;}
  .prog{color:var(--muted);font-size:.8rem;margin:6px 0 14px;}
  .ex{border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:14px;background:var(--panel);margin-bottom:10px;overflow:hidden;}
  .ex .head{display:flex;align-items:center;gap:8px;padding:13px;}
  .ex .name{flex:1;font-weight:700;font-size:.98rem;}
  .badge{font-size:.6rem;font-weight:800;color:var(--accent);background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:2px 6px;}
  .tag{font-size:.6rem;font-weight:700;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:2px 6px;}
  .chev{color:var(--muted2);}
  .meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:0 13px 12px;}
  .chip{font-size:.74rem;font-weight:600;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:4px 8px;display:inline-flex;gap:5px;align-items:center;}
  .chip .k{font-size:.6rem;font-weight:700;color:var(--muted);}
  .chip.rir{background:#2a2417;border-color:#5a4a22;} .chip.rir .k{color:var(--accent);}
  .delta{font-size:.72rem;font-weight:800;border-radius:7px;padding:3px 8px;display:none;}
  .delta.up{color:var(--up);background:#16291c;} .delta.down{color:var(--down);background:#2a1715;} .delta.eq{color:var(--muted);background:var(--panel2);}
  .saved{margin-left:auto;color:var(--accent);font-size:.72rem;font-weight:700;}
  .log{display:none;background:var(--panel2);border-top:1px solid var(--line);padding:4px 13px 12px;}
  .ex.open .log{display:block;}
  .srow{padding:9px 0;border-top:1px solid var(--line);}
  .srow:first-child{border-top:none;}
  .stop{display:flex;justify-content:space-between;margin-bottom:6px;}
  .sn{color:var(--accent);font-weight:800;font-size:.78rem;} .pv{color:var(--muted);font-size:.72rem;}
  .ins{display:flex;align-items:center;gap:8px;}
  .sb{width:50px;height:54px;border-radius:12px;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-size:26px;font-weight:800;}
  .ins input{width:80px;height:54px;border-radius:12px;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-size:20px;font-weight:700;text-align:center;}
  .ins input:focus{outline:none;border-color:var(--accent);}
  .ins .u{color:var(--muted);font-size:.74rem;width:34px;}
  .si{color:var(--muted2);font-size:.72rem;min-width:52px;}
  .saverow{display:flex;gap:8px;margin-top:8px;}
  .btn{flex:1;height:46px;border-radius:12px;border:none;font-weight:800;font-size:.92rem;background:var(--accent);color:#0d0e11;}
  .btn.g{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:0 14px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px;}
  .card h3{margin:0 0 9px;font-size:.98rem;font-weight:800;}
  .card p{margin:.35em 0;font-size:.84rem;color:#c9cdd4;} .card p b{color:var(--txt);}
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .wd{border-radius:9px;padding:8px 2px;text-align:center;background:var(--panel2);border:1px solid var(--line);}
  .wd .w{font-size:.62rem;color:var(--muted);font-weight:700;} .wd .n{font-size:.8rem;font-weight:800;margin-top:2px;}
  .wd.rest .n{color:var(--muted2);} .wd.today{outline:2px solid var(--accent);}
  .ol{list-style:none;counter-reset:n;padding:0;margin:0;}
  .ol li{position:relative;padding:7px 0 7px 28px;font-size:.83rem;color:#c9cdd4;border-top:1px solid var(--line);}
  .ol li:first-child{border-top:none;}
  .ol li::before{counter-increment:n;content:counter(n);position:absolute;left:0;top:7px;width:19px;height:19px;border-radius:6px;background:var(--panel2);color:var(--accent);font-size:.7rem;font-weight:800;display:grid;place-items:center;}
  .danger{width:100%;background:none;border:1px solid #5a2a28;color:var(--down);border-radius:10px;padding:11px;font-weight:700;}
  .fab{position:fixed;right:max(18px,calc(50% - 242px));bottom:calc(74px + env(safe-area-inset-bottom));width:58px;height:58px;border-radius:29px;border:none;font-size:24px;background:var(--accent);color:#0d0e11;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:30;}
  /* bottom nav */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:25;display:flex;max-width:520px;margin:0 auto;background:var(--panel);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);}
  .nav button{flex:1;background:none;border:none;padding:9px 0;color:var(--muted);position:relative;}
  .nav button.on::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--accent);border-radius:0 0 3px 3px;}
  .nav .ic{font-size:19px;opacity:.55;} .nav .lb{font-size:.66rem;font-weight:700;display:block;margin-top:2px;}
  .nav button.on .ic{opacity:1;} .nav button.on .lb{color:var(--accent);font-weight:900;}
  /* modal */
  .ov{position:fixed;inset:0;background:#000b;z-index:40;display:none;align-items:flex-end;}
  .ov.show{display:flex;}
  .sheet{width:100%;max-width:520px;margin:0 auto;background:var(--bg);border-radius:22px 22px 0 0;padding:18px;max-height:92vh;overflow:auto;}
  button,.pill,.tab,.sb,.ic,input{touch-action:manipulation;}
  .pill{display:inline-flex;align-items:center;justify-content:center;height:38px;padding:0 13px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-weight:700;font-size:.82rem;margin:0 6px 7px 0;}
  .pill.on{background:var(--accent);border-color:var(--accent);color:#0d0e11;}
  .sec{color:var(--accent);font-size:.74rem;font-weight:800;margin:14px 0 7px;}
  .erow{display:flex;align-items:center;gap:4px;padding:9px 0;border-bottom:1px solid var(--line);}
  .erow .nm{flex:1;font-weight:700;font-size:.86rem;}
  .erow .ic{width:30px;height:34px;background:none;border:none;color:var(--muted);font-size:14px;font-weight:700;}
  .timer .big{font-size:54px;font-weight:800;font-variant-numeric:tabular-nums;text-align:center;margin:6px 0 0;}
  .timer.over .big{color:var(--up);}
  .flash{animation:fl .5s ease 3;}
  @keyframes fl{0%,100%{background:var(--bg);}50%{background:#2a2417;}}
  /* set rows / progress / color swatch */
  .setrow{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);border-radius:6px;}
  .setrow:active{background:var(--panel2);}
  .setrow .sl{font-size:.78rem;font-weight:800;min-width:58px;}
  .setrow .sv{font-size:.9rem;font-weight:700;}
  .setrow .se{margin-left:auto;color:var(--muted2);font-size:.82rem;}
  .pbar{height:4px;border-radius:2px;background:var(--panel2);margin:6px 0 14px;overflow:hidden;}
  .pbar i{display:block;height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
  .sw{display:inline-block;width:36px;height:36px;border-radius:50%;margin:0 9px 9px 0;border:3px solid transparent;box-shadow:0 0 0 1px var(--line);vertical-align:middle;}
  .sw.on{border-color:var(--txt);transform:scale(1.08);}
  /* mini rest timer bar */
  #mini{position:fixed;left:0;right:0;bottom:calc(56px + env(safe-area-inset-bottom));z-index:26;max-width:520px;margin:0 auto;display:none;align-items:center;gap:10px;background:var(--panel2);border-top:1px solid var(--line);padding:10px 18px 8px;}
  #mini .mbar{position:absolute;left:0;top:0;right:0;height:4px;}
  #mini .mbar i{display:block;height:100%;background:var(--accent);transition:width 1s linear;}
  #mini.over .mbar i{background:var(--up);}
  #mini.show{display:flex;}
  #mini .mt{flex:1;font-weight:800;font-variant-numeric:tabular-nums;font-size:.95rem;color:var(--accent);}
  #mini.over .mt{color:var(--up);}
  #mini .mp,#mini .mx{width:38px;height:38px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-size:14px;font-weight:800;flex:0 0 auto;}
  body.mini-on .fab{bottom:calc(132px + env(safe-area-inset-bottom));}
  body.mini-on .app{padding-bottom:calc(126px + env(safe-area-inset-bottom));}
  #toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(10px);background:var(--txt);color:#0d0e11;font-weight:800;font-size:.84rem;padding:10px 18px;border-radius:999px;opacity:0;pointer-events:none;transition:.25s;z-index:60;}
  #toast.show{opacity:1;transform:translateX(-50%);}
  input[type=text],input[type=number]{font-family:inherit;}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>

<div class="nav" id="nav"></div>
<div class="ov" id="ov"><div class="sheet" id="sheet"></div></div>
<div id="toast"></div>

function big3Latest(k){const a=BIG3[k];return a&&a.length?a[a.length-1].kg:null;}
function repMid(sr){const p=String(sr).split('×')[1]||'';const ns=(p.match(/\d+/g)||[]).map(Number);if(!ns.length)return 10;return ns.length>1?(ns[0]+ns[1])/2:ns[0];}
function repLow(sr){const p=String(sr).split('×')[1]||'';const ns=(p.match(/\d+/g)||[]).map(Number);return ns.length?ns[0]:null;}
function rirMid(r){const ns=(String(r).match(/\d+/g)||[]).map(Number);if(!ns.length)return 1;return ns.length>1?(ns[0]+ns[1])/2:ns[0];}
// 目標レップ+RIRで挙げられる重量をEpley式(1RM=w×(1+reps/30))の逆算で推定
function suggestW(e){
  const[name,sr,rir,,,eq]=e;
  if(eq==='bw')return null;
  const c=EXCOEF[name];if(!c)return null;
  const max=big3Latest(c[0]);if(!max)return null;
  const cap=repMid(sr)+rirMid(rir);
  const w=max*c[1]/(1+cap/30);
  const step=EQ_STEP[eq]??2.5;
  return Math.max(step,Math.round(w/step)*step);
}

let hview='date'; let hpart='chest'; const expandedH=new Set();

function toast(m,ms=1700){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),ms);}

/* ====== ナビ・タブ ====== */
const NAV=[['workout','🏋️','ワーク'],['history','📅','履歴'],['weight','⚖️','体重'],['info','ℹ️','概要']];
function buildNav(){document.getElementById('nav').innerHTML=NAV.map(([k,i,l])=>
  `<button class="${tab===k?'on':''}" onclick="setTab('${k}')"><span class="ic">${i}</span><span class="lb">${l}</span></button>`).join('');}

  document.getElementById('fab').style.display=tab==='workout'?'block':'none';

/* ====== ワークアウト ====== */

  const day=PROGRAM.find(d=>d.key===activeDay)||PROGRAM[0];
  document.documentElement.style.setProperty('--accent',day.color);
  document.getElementById('tabsWrap').innerHTML=`<div class="seltag">メニューを選択</div>
    <nav class="tabs">${PROGRAM.map(d=>`<button class="tab" aria-selected="${d.key===activeDay}" style="--tabc:${d.color}" onclick="selDay('${d.key}')"><span class="pip"></span>${esc(d.label)}</button>`).join('')}<button class="tab" style="--tabc:var(--muted2)" onclick="addDay()">＋ 追加</button></nav>`;
  const logged=day.ex.filter(e=>todaySession(day.key,e[0])).length;
  let h=`<div class="dh"><div>${day.en?`<div class="eyebrow" style="color:${day.color}">${day.en}</div>`:''}<h2>${esc(day.label)}</h2></div>
    <button class="editbtn" onclick="openEditor()">✎ 編集</button></div>
    <div class="focus">${day.ex.length}種目 ・ 合計 ${totalSets(day.ex)}セット</div>
    <div class="prog" style="margin-bottom:0">記録済み ${logged}/${day.ex.length} 種目</div>
    <div class="pbar"><i style="width:${day.ex.length?Math.round(logged/day.ex.length*100):0}%"></i></div>`;
  if(!TIPDONE&&Object.keys(LOGS).length===0){
    h+=`<div class="card" style="border:1px solid color-mix(in srgb,var(--accent) 40%,var(--line));margin-bottom:14px;position:relative">
      <button class="ic" style="position:absolute;top:8px;right:8px;font-size:16px;padding:4px 8px" onclick="hideTip()">✕</button>
      <div style="font-weight:800;margin-bottom:6px">💡 はじめての方へ</div>
      <div class="pv" style="line-height:1.8">「概要」タブでBIG3のMAXを登録すると、初めての種目でも重さを自動提案します。セットを記録すると休憩タイマーが自動で走り、2回目からは前回の重量・回数が自動入力されます。</div>
    </div>`;
  }
  day.ex.forEach((e,i)=>h+=card(day,e,i));
  if(!day.ex.length)h+=`<p style="color:var(--muted2);text-align:center;padding:24px 0">種目がありません。「✎ 編集」から追加してください。</p>`;
  document.getElementById('main').innerHTML=h;
}
function selDay(k){activeDay=k;activeExState=null;expanded.clear();render();window.scrollTo(0,0);}

function card(day,e,idx){
  const[name,sr,rir,rest,tagv,eq]=e,n=setCount(sr);
  const prev=prevSession(day.key,name),te=todaySession(day.key,name);
  const step=EQ_STEP[eq]??2.5;
  const isActive=activeExState&&activeExState.dk===day.key&&activeExState.idx===idx;
  if(isActive)return activeCard(day,e,idx,prev,n,step);
  if(te){
    const sum=te.sets.filter(s=>s.w!=null||s.r!=null).map((s,i)=>`<span class="chip"><span class="k">SET${i+1}</span>${s.w!=null?fmtW(s.w)+'kg':'–'}×${s.r!=null?s.r+'回':'–'}</span>`).join('');
    return `<div class="ex" style="border-left-color:var(--up)">
      <div class="head"><span class="name">${esc(name)}</span>${EQ_LABEL[eq]?`<span class="badge">${EQ_LABEL[eq]}</span>`:''}${tagv?`<span class="tag">${tagv}</span>`:''}<span class="saved" style="margin-left:auto">✓ 完了</span></div>
      <div style="padding:0 13px 12px"><div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">${sum||'<span class="pv">データなし</span>'}</div>
      <div style="display:flex;gap:8px"><button class="btn" style="height:38px;font-size:.82rem" onclick="editEx('${day.key}',${idx})">✎ 編集</button><button class="btn g" style="height:38px;font-size:.82rem" onclick="clearExNew('${day.key}',${idx})">削除</button></div></div></div>`;
  }
  const prevChips=prev?prev.sets.filter(s=>s.w!=null||s.r!=null).map((s,i)=>`<span class="chip"><span class="k">SET${i+1}</span>${s.w!=null?fmtW(s.w)+'kg':'–'}×${s.r!=null?s.r+'回':'–'}</span>`).join(''):'<span style="color:var(--muted2);font-size:.8rem">前回記録なし</span>';
  return `<div class="ex">
    <div class="head"><span class="name">${esc(name)}</span>${EQ_LABEL[eq]?`<span class="badge">${EQ_LABEL[eq]}</span>`:''}${tagv?`<span class="tag">${tagv}</span>`:''}</div>
    <div class="meta"><span class="chip"><span class="k">SET×REP</span>${sr}</span><span class="chip rir"><span class="k">RIR</span>${rir}</span><span class="chip"><span class="k">休息</span>${rest}</span></div>
    <div style="padding:0 13px 12px;border-top:1px solid var(--line)">
      ${MEMO[exKey(day.key,name)]?`<div style="margin-bottom:8px"><span class="pv">📝 ${esc(MEMO[exKey(day.key,name)])}</span></div>`:''}
      <div style="margin-bottom:10px"><span style="font-size:.62rem;color:var(--muted2);font-weight:700;letter-spacing:.1em">前回 </span><span style="display:inline-flex;flex-wrap:wrap;gap:5px">${prevChips}</span></div>
      <div style="display:flex;gap:8px"><button class="btn" style="flex:1" onclick="startEx('${day.key}',${idx})">▶ Start</button>${prev?`<button class="btn g" style="flex:0 0 auto;padding:0 14px;font-size:.82rem" onclick="copyPrev('${day.key}',${idx})">前回コピー</button>`:''}</div></div></div>`;
}

function activeCard(day,e,idx,prev,n,step){
  const[name,sr,rir,rest,tagv,eq]=e,{setIdx,sets,confirmed}=activeExState;
  const remaining=[];for(let i=0;i<n;i++)if(i!==setIdx&&!confirmed.has(i))remaining.push(i);
  const isFinal=remaining.length===0;
  const pv=prev&&prev.sets[setIdx]?prev.sets[setIdx]:null;
  const curSet=sets[setIdx]||{},curW=curSet.w!=null?fmtW(curSet.w):'',curR=curSet.r!=null?String(curSet.r):'';
  let slist='';
  for(let i=0;i<n;i++){
    const s=sets[i]||{},ppv=prev&&prev.sets[i]?prev.sets[i]:null;
    if(i===setIdx)
      slist+=`<div class="setrow"><span class="sl" style="color:var(--accent)">SET ${i+1} ▶</span><span class="sv" style="color:var(--muted);font-size:.8rem">入力中</span></div>`;
    else if(confirmed.has(i))
      slist+=`<div class="setrow" onclick="gotoSet(${i})"><span class="sl" style="color:var(--up)">SET ${i+1} ✓</span><span class="sv">${s.w!=null?fmtW(s.w)+'kg':'–'} × ${s.r!=null?s.r+'回':'–'}</span><span class="se">✎ タップで修正</span></div>`;
    else
      slist+=`<div class="setrow" onclick="gotoSet(${i})"><span class="sl" style="color:var(--muted2)">SET ${i+1}</span><span class="sv" style="color:var(--muted2);font-weight:600;font-size:.8rem">${ppv&&ppv.w!=null?fmtW(ppv.w)+'kg (前回)':(activeExState.sug?fmtW(activeExState.sug)+'kg (推奨)':'–')}</span></div>`;
  }
  return `<div class="ex open" style="border-left-color:var(--accent);border-color:color-mix(in srgb,var(--accent) 55%,var(--line))">
    <div class="head"><span class="name">${esc(name)}</span>${EQ_LABEL[eq]?`<span class="badge">${EQ_LABEL[eq]}</span>`:''}${tagv?`<span class="tag">${tagv}</span>`:''}<button class="btn g" style="margin-left:auto;height:32px;padding:0 10px;font-size:.76rem" onclick="cancelEx()">✕ 中断</button></div>
    <div class="log">
      <div style="background:color-mix(in srgb,var(--accent) 8%,var(--panel2));border:1px solid color-mix(in srgb,var(--accent) 35%,var(--line));border-radius:12px;padding:14px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">
          <span style="font-size:2.2rem;font-weight:800;color:var(--accent);line-height:1">SET ${setIdx+1}<span style="font-size:1rem;color:var(--muted);font-weight:600"> / ${n}</span></span>
          <span class="pv" style="text-align:right;line-height:1.7">${pv?`前回<br><b style="color:var(--txt);font-size:.9rem">${fmtW(pv.w)}kg × ${pv.r??'–'}回</b>`:(activeExState.sug?`推奨(BIG3から算出)<br><b style="color:var(--accent);font-size:.9rem">${fmtW(activeExState.sug)}kg</b>`:'前回<br>記録なし')}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
          <div class="ins"><span class="u">重量</span><button class="sb" onclick="aAdj('w',${-step})">−</button><input id="aw" inputmode="decimal" value="${curW}" oninput="updPlates()" placeholder="${pv&&pv.w!=null?fmtW(pv.w):'kg'}" style="flex:1;height:58px;font-size:24px;font-weight:800;text-align:center;border-radius:12px;background:var(--bg);border:2px solid var(--accent);color:var(--txt);font-family:inherit"><button class="sb" onclick="aAdj('w',${step})">＋</button><span class="si">kg(±${step})</span></div>
          <div class="ins"><span class="u">回数</span><button class="sb" onclick="aAdj('r',-1)">−</button><input id="ar" inputmode="numeric" value="${curR}" placeholder="${pv&&pv.r!=null?pv.r:'回'}" style="flex:1;height:58px;font-size:24px;font-weight:800;text-align:center;border-radius:12px;background:var(--bg);border:2px solid var(--accent);color:var(--txt);font-family:inherit"><button class="sb" onclick="aAdj('r',1)">＋</button><span class="si">回(±1)</span></div>
        </div>
        ${eq==='bb'?`<div class="pv" id="plates" style="text-align:center;margin:-4px 0 10px;min-height:1em">${plateStr(curSet.w,eq)}</div>`:''}
        <button class="btn" style="width:100%;height:56px;font-size:1.02rem" onclick="${isFinal?'doneEx()':'nextSet()'}">✓ SET ${setIdx+1} 完了${isFinal?'して保存':''}</button>
        ${isFinal?'':`<button class="ic" style="width:100%;color:var(--muted2);text-decoration:underline;margin-top:8px;font-size:.78rem" onclick="doneEx()">ここまでで保存して終了</button>`}
      </div>
      <div style="padding:0 2px">${slist}</div>
      <input id="memoIn" type="text" value="${esc(MEMO[exKey(day.key,name)]||'')}" placeholder="📝 メモ(シート高さ・グリップ幅など)" maxlength="60"
        onchange="setMemoCur(this.value)"
        style="width:100%;height:40px;margin-top:12px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:0 12px;font-size:13px">
    </div>
  </div>`;
}


// 前回と同じ内容を今日の記録として1タップ保存
function copyPrev(dk,idx){
  const day=PROGRAM.find(d=>d.key===dk),e=day.ex[idx];
  const prev=prevSession(dk,e[0]);if(!prev)return;
  const k=exKey(dk,e[0]),hist=LOGS[k]||[],date=todayStr();
  const en={date,sets:clone(prev.sets)};
  const li=hist.findIndex(x=>x.date===date);
  if(li>=0)hist[li]=en;else hist.push(en);
  LOGS[k]=hist.slice(-50);saveLogs();
  toast('前回と同じ内容で記録しました ✓');renderWorkout();
}
function startEx(dk,idx){
  const day=PROGRAM.find(d=>d.key===dk),e=day.ex[idx],n=setCount(e[1]);
  const prev=prevSession(dk,e[0]);
  const sug=prev?null:suggestW(e);           // 前回記録がある種目は実績を優先
  const rlow=prev?null:repLow(e[1]);         // 初回は目標レップ下限をプリフィル
  const sets=Array.from({length:n},(_,i)=>{const pv=prev&&prev.sets[i]?prev.sets[i]:null;return{w:pv&&pv.w!=null?pv.w:sug,r:pv&&pv.r!=null?pv.r:rlow};});
  activeExState={dk,idx,setIdx:0,sets,confirmed:new Set(),sug};
  renderWorkout();
  setTimeout(()=>{const el=document.querySelector('.ex.open');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},60);
}
function editEx(dk,idx){
  const day=PROGRAM.find(d=>d.key===dk),e=day.ex[idx],n=setCount(e[1]);
  const today=todaySession(dk,e[0]),prev=prevSession(dk,e[0]);
  const confirmed=new Set();
  const sets=Array.from({length:n},(_,i)=>{
    const tv=today&&today.sets[i]?today.sets[i]:null;
    const pv=prev&&prev.sets[i]?prev.sets[i]:null;
    if(tv&&(tv.w!=null||tv.r!=null))confirmed.add(i);
    return{w:tv&&tv.w!=null?tv.w:(pv&&pv.w!=null?pv.w:null),r:tv&&tv.r!=null?tv.r:(pv&&pv.r!=null?pv.r:null)};
  });
  activeExState={dk,idx,setIdx:0,sets,confirmed};
  renderWorkout();
  setTimeout(()=>{const el=document.querySelector('.ex.open');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},60);
}

// バーベル(20kg)基準の片側プレート内訳
function plateStr(w,eq){
  if(eq!=='bb')return '';
  w=parseFloat(w);if(w==null||isNaN(w)||w<=0)return '';
  const bar=20;
  if(w<=bar)return 'バー(20kg)のみ/以下';
  let per=(w-bar)/2,out=[];
  for(const p of [20,15,10,5,2.5,1.25]){while(per>=p-0.001){out.push(p);per-=p;}}
  return `片側: ${out.join(' + ')||'—'}${per>0.01?' +端数':''}`;
}
function updPlates(){
  const el=document.getElementById('plates');if(!el||!activeExState)return;
  const day=PROGRAM.find(d=>d.key===activeExState.dk),e=day.ex[activeExState.idx];
  el.textContent=plateStr(document.getElementById('aw')?.value,e[5]);
}
function setMemoCur(v){
  if(!activeExState)return;
  const day=PROGRAM.find(d=>d.key===activeExState.dk),e=day.ex[activeExState.idx];
  const k=exKey(activeExState.dk,e[0]);
  v=(v||'').trim();if(v)MEMO[k]=v;else delete MEMO[k];
  saveMemoStore();
}
function aAdj(key,d){
  const el=document.getElementById(key==='w'?'aw':'ar');if(!el)return;
  let v=parseFloat(el.value);if(isNaN(v))v=0;
  v=key==='w'?Math.max(0,Math.round((v+d)*4)/4):Math.max(0,Math.round(v+d));
  el.value=key==='w'?fmtW(v):v;
  if(key==='w')updPlates();
}
function readActive(){
  const wv=document.getElementById('aw')?.value||'',rv=document.getElementById('ar')?.value||'';
  const w=wv!==''?parseFloat(wv):null,r=rv!==''?parseInt(rv):null;
  return{w:isNaN(w)?null:w,r:isNaN(r)?null:r};
}
function nextSet(){
  if(!activeExState)return;
  const{sets,setIdx,confirmed}=activeExState,cur=readActive();
  sets[setIdx]={w:cur.w,r:cur.r};confirmed.add(setIdx);
  // 次の未完了セットへ(いま入力した値をそのまま引き継ぎ)
  const nn=sets.length;let nx=-1;
  for(let i=setIdx+1;i<nn;i++)if(!confirmed.has(i)){nx=i;break;}
  if(nx<0)for(let i=0;i<nn;i++)if(!confirmed.has(i)){nx=i;break;}
  if(nx<0){doneEx();return;}
  if(cur.w!=null)sets[nx].w=cur.w;
  if(cur.r!=null)sets[nx].r=cur.r;
  activeExState.setIdx=nx;
  autoRest();
  renderWorkout();
  setTimeout(()=>{const el=document.querySelector('.ex.open');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},60);
}
function gotoSet(i){
  if(!activeExState)return;
  const cur=readActive();
  activeExState.sets[activeExState.setIdx]={w:cur.w,r:cur.r};
  activeExState.setIdx=i;
  renderWorkout();
}
function doneEx(){
  if(!activeExState)return;
  const{sets,setIdx,dk,idx}=activeExState,cur=readActive();
  sets[setIdx]={w:cur.w,r:cur.r};
  if(!sets.some(s=>s.w!=null||s.r!=null)){toast('入力がありません');return;}
  const day=PROGRAM.find(d=>d.key===dk),e=day.ex[idx];
  const k=exKey(dk,e[0]),hist=LOGS[k]||[],date=todayStr(),li=hist.findIndex(s=>s.date===date);
  const en={date,sets};if(li>=0)hist[li]=en;else hist.push(en);
  LOGS[k]=hist.slice(-50);saveLogs();
  activeExState=null;
  // 自己ベスト(推定1RM)判定
  const e1=s2=>s2.w!=null&&s2.r?s2.w*(1+s2.r/30):0;
  const bestOf=ss=>Math.max(0,...ss.map(e1));
  const todayBest=bestOf(sets);
  let prevBest=0;hist.forEach(h2=>{if(h2.date<date)prevBest=Math.max(prevBest,bestOf(h2.sets));});
  if(prevBest>0&&todayBest>prevBest+0.01){
    const r1=x=>Math.round(x*10)/10;
    toast(`🎉 自己ベスト更新! 推定1RM ${r1(todayBest)}kg(+${r1(todayBest-prevBest)})`,3200);
  }else toast('記録しました ✓');
  autoRest(dk,idx); // 次の種目までの休憩もタイマー開始
  renderWorkout();
  // 次の未記録種目へ自動スクロール
  const ni=day.ex.findIndex(e2=>!todaySession(dk,e2[0]));
  if(ni>=0)setTimeout(()=>{const els=document.querySelectorAll('#main .ex');if(els[ni])els[ni].scrollIntoView({behavior:'smooth',block:'center'});},120);
}
function cancelEx(){activeExState=null;renderWorkout();}
function clearExNew(dk,idx){
  const day=PROGRAM.find(d=>d.key===dk),k=exKey(dk,day.ex[idx][0]),date=todayStr();
  if(LOGS[k]){LOGS[k]=LOGS[k].filter(s=>s.date!==date);if(!LOGS[k].length)delete LOGS[k];saveLogs();}
  toast('今日分を削除');renderWorkout();
}

/* ====== メニュー編集 ====== */
const PALETTE=['#e5645b','#f0a23b','#e8c84a','#7bc95f','#37b59e','#4fc3d9','#5aa0e0','#9384ea','#c47ee0','#e07ab8','#e0806a','#9aa3b2'];
let newDayKey=null;
function addDay(){
  const key='d'+Date.now().toString(36);
  const color=PALETTE[PROGRAM.length%PALETTE.length];
  PROGRAM.push({key,label:'新メニュー',en:'',color,focus:'',ex:[]});
  saveProgram();activeDay=key;activeExState=null;newDayKey=key;render();openEditor();
}
let delDayArm=false;
function eDelDay(btn){
  if(PROGRAM.length<=1){toast('最後のメニューは削除できません');return;}
  if(!delDayArm){delDayArm=true;btn.textContent='もう一度タップで削除(記録は履歴に残ります)';setTimeout(()=>{delDayArm=false;if(btn.isConnected)btn.textContent='このメニューを削除';},3000);return;}
  delDayArm=false;newDayKey=null;
  PROGRAM=PROGRAM.filter(d=>d.key!==activeDay);
  SCHEDULE=SCHEDULE.map(k=>k===activeDay?null:k);
  saveProgram();saveSchedule();
  todayKey=SCHEDULE[todayWd===0?6:todayWd-1]||null;
  activeDay=PROGRAM[0].key;closeSheet();render();toast('メニューを削除しました');
}
let edit={ex:null,view:'list',idx:-1,m:null,eq:null,name:'',custom:false,sets:3,reps:'8–12',rir:'1–2',rest:'90秒',label:''};
function openEditor(){const day=PROGRAM.find(d=>d.key===activeDay);edit={ex:day.ex.map(e=>e.slice()),view:'list',idx:-1,m:null,eq:null,name:'',custom:false,sets:3,reps:'8–12',rir:'1–2',rest:'90秒',label:day.label,color:day.color};renderEditor();showSheet();}
function eColor(c){edit.color=c;renderEditor();}
function renderEditor(){
  const day=PROGRAM.find(d=>d.key===activeDay);
  if(edit.view==='list'){
    let h=`<div style="display:flex;align-items:center;margin:0 0 10px"><h3 style="margin:0">メニュー編集</h3><button class="ic" style="margin-left:auto;font-size:18px;padding:6px 10px" onclick="closeSheet()">✕</button></div>
      <div class="sec" style="margin-top:0">メニュー名(自由に変更できます)</div>
      <input type="text" id="dayName" value="${esc(edit.label)}" oninput="edit.label=this.value" maxlength="20" placeholder="例: 胸+三頭, プッシュの日"
        style="width:100%;height:46px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:0 14px;font-size:15px;font-weight:700;margin-bottom:6px">
      <div class="sec">テーマカラー</div>
      <div>${PALETTE.map(c=>`<span class="sw ${edit.color===c?'on':''}" style="background:${c}" onclick="eColor('${c}')"></span>`).join('')}</div>

let tEl=0,tRun=false,tAlert=90,tFired=false,tInt=null,actx=null;
let AUTOTIMER=true;try{AUTOTIMER=localStorage.getItem('gym-autotimer-v1')!=='0';}catch(e){}

// '90秒'/'2分'/'2–3分'/'60–90秒' → 秒数(下限値を採用)
function restSecs(rest){const m=String(rest||'').match(/(\d+(?:\.\d+)?)/);if(!m)return 90;const v=parseFloat(m[1]);return Math.max(15,Math.round(/分/.test(rest)?v*60:v));}
function autoRest(dk,idx){
  if(!AUTOTIMER)return;
  if(dk==null){if(!activeExState)return;dk=activeExState.dk;idx=activeExState.idx;}
  const day=PROGRAM.find(d=>d.key===dk);if(!day)return;
  const e=day.ex[idx];if(!e)return;
  startRestTimer(restSecs(e[3]));
}
function startRestTimer(sec){
  tAlert=sec;tEl=0;tFired=false;
  clearInterval(tInt);
  tRun=true;

  tInt=setInterval(tTick,1000);
  updateMini();
}
function tTick(){
  tEl++;
  if(!tFired&&tEl>=tAlert){
    tFired=true;beep();setTimeout(beep,500);setTimeout(beep,1000);
    try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);}catch(e){}
    const b=document.getElementById('timerBox');if(b){b.classList.add('flash');setTimeout(()=>b.classList.remove('flash'),1600);}
  }
  updateMini();

}
function updateMini(){
  const el=document.getElementById('mini');if(!el)return;
  const active=tRun||tEl>0;
  el.classList.toggle('show',active);
  document.body.classList.toggle('mini-on',active);
  if(!active)return;
  el.classList.toggle('over',tEl>=tAlert);
  el.querySelector('.mt').textContent=tEl>=tAlert?`✓ 休憩終了 +${mmss(tEl-tAlert)}`:`⏱ 休憩中 残り ${mmss(tAlert-tEl)}`;
  el.querySelector('.mp').textContent=tRun?'❚❚':'▶';
  const bar=el.querySelector('.mbar i');if(bar)bar.style.width=Math.min(100,Math.round(tEl/tAlert*100))+'%';
}
function beep(){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(0.0001,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.35,actx.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+0.4);o.start();o.stop(actx.currentTime+0.42);}catch(e){}}
const mmss=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
function openTimer(){renderTimer();showSheet();}
function renderTimer(){
  const over=tEl>=tAlert;
  document.getElementById('sheet').innerHTML=`<div class="timer ${over?'over':''}" id="timerBox">
    <div class="pv" style="text-align:center">休憩タイマー</div>
    <div style="position:relative;width:200px;height:200px;margin:8px auto 12px">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="86" fill="none" stroke="var(--panel2)" stroke-width="12"/>
        <circle cx="100" cy="100" r="86" fill="none" stroke="${over?'var(--up)':'var(--accent)'}" stroke-width="12" stroke-linecap="round"
          stroke-dasharray="540.4" stroke-dashoffset="${over?0:(-540.4*Math.min(1,tEl/tAlert)).toFixed(1)}" transform="rotate(-90 100 100)"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px">
        ${over
          ?`<div style="font-size:.95rem;font-weight:800;color:var(--up)">✓ 休憩終了</div><div style="font-size:1.8rem;font-weight:800;color:var(--up);font-variant-numeric:tabular-nums">+${mmss(tEl-tAlert)}</div>`
          :`<div style="font-size:2.4rem;font-weight:800;color:var(--txt);line-height:1.1;font-variant-numeric:tabular-nums">${mmss(tAlert-tEl)}</div><div class="pv">残り / 設定 ${mmss(tAlert)}</div>`}
        <div class="pv">経過 ${mmss(tEl)}</div>
      </div>
    </div>
    <div class="saverow"><button class="btn" onclick="tToggle()">${tRun?'一時停止':'スタート'}</button><button class="btn g" onclick="tReset()">リセット</button></div>
    <div class="pv" style="margin:16px 0 8px;text-align:center">アラート時間: ${mmss(tAlert)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:10px">
      <button onclick="tAdj(-30)" style="height:48px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:13px;font-weight:800">−30s</button>
      <button onclick="tAdj(-15)" style="height:48px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:13px;font-weight:800">−15s</button>
      <button onclick="tAdj(15)" style="height:48px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:13px;font-weight:800">＋15s</button>
      <button onclick="tAdj(30)" style="height:48px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:13px;font-weight:800">＋30s</button>
    </div>
    <div style="display:flex;justify-content:center;flex-wrap:wrap;gap:6px">${[60,90,120,150,180].map(p=>`<span class="pill ${tAlert===p?'on':''}" onclick="tPreset(${p})">${p}s</span>`).join('')}</div>
    <div style="text-align:center;margin-top:14px"><span class="pill ${AUTOTIMER?'on':''}" onclick="toggleAuto()">セット保存時に自動スタート: ${AUTOTIMER?'ON':'OFF'}</span></div>
    <div class="pv" style="text-align:center;margin-top:4px">ONにすると「SET完了」で種目の休息時間ぶんのタイマーが自動で走ります</div>
    <button class="btn g" style="width:100%;margin-top:14px" onclick="closeSheet()">閉じる</button></div>`;
}
function tToggle(){
  if(tRun){tRun=false;clearInterval(tInt);}
  else{tRun=true;try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();}catch(e){}clearInterval(tInt);tInt=setInterval(tTick,1000);}
  updateMini();if(document.getElementById('timerBox'))renderTimer();
}
function tReset(){tRun=false;clearInterval(tInt);tEl=0;tFired=false;updateMini();if(document.getElementById('timerBox'))renderTimer();}
function tAdj(d){tAlert=Math.max(15,tAlert+d);tFired=tEl>=tAlert?tFired:false;updateMini();renderTimer();}
function tPreset(p){tAlert=p;tFired=false;updateMini();renderTimer();}

function hideTip(){TIPDONE=true;try{localStorage.setItem('gym-tip-v1','1');}catch(e){}renderWorkout();}
/* ====== シート開閉 ====== */
function showSheet(){document.getElementById('ov').classList.add('show');}
function closeSheet(){
  document.getElementById('ov').classList.remove('show');
  // 「＋追加」直後に保存せず閉じた場合は空メニューを破棄
  if(newDayKey){
    const d=PROGRAM.find(x=>x.key===newDayKey);
    if(d&&d.ex.length===0&&d.label==='新メニュー'){
      PROGRAM=PROGRAM.filter(x=>x.key!==newDayKey);
      SCHEDULE=SCHEDULE.map(k=>k===newDayKey?null:k);
      saveProgram();
      if(activeDay===newDayKey)activeDay=PROGRAM[0].key;
      render();
    }
    newDayKey=null;
  }
}
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeSheet();});
// 想定外のエラーで画面がスタックしないための自己回復
window.addEventListener('error',()=>{try{document.getElementById('ov').classList.remove('show');newDayKey=null;toast('エラーが発生しました。操作をやり直してください');}catch(_e){}});

/* ====== 履歴 ====== */
function dayMeta(k){const d=PROGRAM.find(x=>x.key===k);return d?{label:d.label,color:d.color}:{label:k,color:'var(--muted)'};}
function setsStr(sets){const a=sets.filter(s=>s.w!=null||s.r!=null).map(s=>`${s.w!=null?fmtW(s.w):'-'}×${s.r!=null?s.r:'-'}`);return a.length?a.join(',  '):'記録なし';}
function setsDone(sets){return sets.filter(s=>s.w!=null&&s.r!=null).length;}
function wdName(date){const[y,m,d]=date.split('-').map(Number);return ['日','月','火','水','木','金','土'][new Date(y,m-1,d).getDay()];}
function setTab2(){} // noop
function setHView(v){hview=v;expandedH.clear();renderHistory();}
function setHPart(k){hpart=k;expandedH.clear();renderHistory();}
function togH(k){expandedH.has(k)?expandedH.delete(k):expandedH.add(k);renderHistory();}

function buildByDate(){
  const map={};
  Object.keys(LOGS).forEach(k=>{const i=k.indexOf('|'),dk=k.slice(0,i),name=k.slice(i+1);
    LOGS[k].forEach(s=>{(map[s.date]=map[s.date]||{});(map[s.date][dk]=map[s.date][dk]||[]).push({name,sets:s.sets});});});
  return Object.keys(map).sort().reverse().map(date=>({date,days:map[date]}));
}
function lineChart(vals){
  if(vals.length<2)return '';
  const W=Math.min(440,(document.querySelector('.app')?.clientWidth||360)-66),H=140;
  const mn=Math.min(...vals),mx=Math.max(...vals),pad=(mx-mn)*0.15||1,lo=mn-pad,hi=mx+pad;
  const X=i=>15+i/(vals.length-1)*W,Y=v=>10+(1-(v-lo)/(hi-lo))*(H-30);
  const pts=vals.map((v,i)=>`${X(i)},${Y(v)}`).join(' ');
  return `<div class="card"><div class="pv" style="margin-bottom:6px">セッション総挙上量の推移</div><svg width="${W+30}" height="${H}">
    <text x="15" y="${Y(mx)-4}" fill="var(--muted2)" font-size="10">${Math.round(mx).toLocaleString()}kg</text>
    <text x="15" y="${Y(mn)+12}" fill="var(--muted2)" font-size="10">${Math.round(mn).toLocaleString()}kg</text>
    <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
    ${vals.map((v,i)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="${i===vals.length-1?4:2.5}" fill="var(--accent)"/>`).join('')}</svg></div>`;
}
function sessionCard(key,dateLabel,sub,totS,totV,bodyHtml){
  const open=expandedH.has(key);
  return `<div class="card" style="padding:0">
    <div class="head" onclick="togH('${key}')">
      <div><div style="font-weight:800;font-size:1.02rem">${dateLabel}</div><div style="margin-top:4px">${sub}</div></div>
      <div style="margin-left:auto;text-align:right"><div class="pv">${totS}セット</div><div style="font-weight:800;font-size:.9rem">${Math.round(totV).toLocaleString()}kg</div></div>
      <span class="chev" style="margin-left:8px">${open?'▾':'▸'}</span></div>
    ${open?`<div style="padding:0 13px 13px">${bodyHtml}</div>`:''}</div>`;
}
function exLines(list){return list.map(x=>`<div style="padding:7px 0;border-top:1px solid var(--line)"><div style="font-weight:700;font-size:.85rem">${esc(x.name)}</div><div class="pv" style="margin-top:2px">${setsStr(x.sets)}</div></div>`).join('');}

function histDate(){
  const arr=buildByDate();
  if(!arr.length)return '<p style="color:var(--muted2);text-align:center;padding:30px 0">まだ記録がありません。<br>ワークアウトを保存すると、ここに日付ごとに表示されます。</p>';
  return arr.map(({date,days})=>{
    const[, m,d]=date.split('-').map(Number);
    let totV=0,totS=0,badges='',body='';
    Object.keys(days).forEach(dk=>{const meta=dayMeta(dk),list=days[dk];
      const v=list.reduce((a,x)=>a+vol(x.sets),0),sc=list.reduce((a,x)=>a+setsDone(x.sets),0);
      totV+=v;totS+=sc;
      badges+=`<span class="badge" style="color:${meta.color};border-color:${meta.color}66;margin-right:5px">${esc(meta.label)}</span>`;
      body+=`<div style="margin-top:6px"><div class="pv" style="color:${meta.color};font-weight:800">${esc(meta.label)}</div>${exLines(list)}</div>`;});
    return sessionCard('hd-'+date,`${m}/${d} <span class="pv">(${wdName(date)})</span>`,badges,totS,totV,body);
  }).join('');
}

function histPart(){
  let h=`<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:10px">${PROGRAM.map(d=>{const on=hpart===d.key;return`<span class="pill ${on?'on':''}" style="margin:0;flex:0 0 auto;${on?`background:${d.color};border-color:${d.color};color:#0d0e11`:'font-weight:700'}" onclick="setHPart('${d.key}')">${esc(d.label)}</span>`}).join('')}</div>`;
  const prefix=hpart+'|',map={};
  Object.keys(LOGS).filter(k=>k.indexOf(prefix)===0).forEach(k=>{const name=k.slice(prefix.length);
    LOGS[k].forEach(s=>{(map[s.date]=map[s.date]||[]).push({name,sets:s.sets});});});
  const datesAsc=Object.keys(map).sort();
  if(!datesAsc.length)return h+'<p style="color:var(--muted2);text-align:center;padding:30px 0">この部位の記録はまだありません。</p>';
  const vols=datesAsc.map(dt=>map[dt].reduce((a,x)=>a+vol(x.sets),0));
  const meta=dayMeta(hpart);
  h+=`<div class="pv" style="margin:4px 0 10px">${esc(meta.label)}の記録: ${datesAsc.length}回</div>`;
  h+=lineChart(vols);
  h+=[...datesAsc].reverse().map(date=>{const[, m,d]=date.split('-').map(Number),list=map[date];
    const v=list.reduce((a,x)=>a+vol(x.sets),0),sc=list.reduce((a,x)=>a+setsDone(x.sets),0);
    return sessionCard('hp-'+date,`${m}/${d} <span class="pv">(${wdName(date)})</span>`,`<span class="badge" style="color:${meta.color};border-color:${meta.color}66">${esc(meta.label)}</span>`,sc,v,exLines(list));
  }).join('');
  return h;
}

function renderHistory(){
  document.getElementById('tabsWrap').innerHTML='';
  document.documentElement.style.setProperty('--accent','#f0a23b');
  const seg=`<div style="display:flex;gap:8px;margin-bottom:14px">
    <button class="pill ${hview==='date'?'on':''}" style="flex:1;height:42px;margin:0;border:1px solid ${hview==='date'?'var(--accent)':'var(--line)'}" onclick="setHView('date')">日付ごと</button>
    <button class="pill ${hview==='part'?'on':''}" style="flex:1;height:42px;margin:0;border:1px solid ${hview==='part'?'var(--accent)':'var(--line)'}" onclick="setHView('part')">部位ごと</button></div>`;
  document.getElementById('main').innerHTML=
    `<div class="eyebrow" style="color:var(--accent)">HISTORY</div><h2 style="margin:.05em 0 14px;font-size:1.5rem;font-weight:800">トレ履歴</h2>`+seg+(hview==='date'?histDate():histPart());
}

/* ====== 起動 ====== */
initStore();migrateMenu();
todayKey=SCHEDULE[todayWd===0?6:todayWd-1]||null;
activeDay=todayKey||PROGRAM[0]?.key||'chest';
hpart=todayKey||PROGRAM[0]?.key||'chest';
buildNav();render();
</script>
