<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0e11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MMate">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>MMate</title>
<style>
  :root{
    --bg:#0d0e11;--panel:#16181e;--panel2:#1d2027;--line:#2a2e37;
    --txt:#eceef1;--muted:#8c93a0;--muted2:#5f6671;--accent:#f0a23b;
    --up:#46c46e;--down:#ec6a5e;
    --chest:#e5645b;--back:#37b59e;--delts:#f0a23b;--legs:#9384ea;--arms:#5aa0e0;
    font-size:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--txt);overscroll-behavior-y:none;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;}
  .app{max-width:520px;margin:0 auto;padding-top:env(safe-area-inset-top);padding-bottom:calc(84px + env(safe-area-inset-bottom));display:flex;flex-direction:column;min-height:100dvh;}
  main{flex:1;padding:14px 16px 24px;}
  .eyebrow{font-size:.66rem;letter-spacing:.2em;color:var(--muted);font-weight:700;}
  h2{margin:.05em 0 12px;font-size:1.5rem;font-weight:800;}
  .pv{color:var(--muted);font-size:.78rem;}

  /* ===== メニュー切替チップ ===== */
  .tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 4px;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;min-height:44px;padding:0 16px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-weight:700;font-size:.95rem;display:flex;align-items:center;gap:7px;}
  .tab .pip{width:9px;height:9px;border-radius:50%;background:var(--tabc,var(--muted2));}
  .tab[aria-selected=true]{color:var(--txt);background:color-mix(in srgb,var(--tabc) 20%,var(--panel));border-color:color-mix(in srgb,var(--tabc) 60%,var(--line));}

  /* ===== ホーム種目カード(大タップ領域) ===== */
  .pbar{height:6px;border-radius:3px;background:var(--panel2);margin:8px 0 16px;overflow:hidden;}
  .pbar i{display:block;height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}
  .xc{display:block;width:100%;text-align:left;border:1px solid var(--line);border-left:5px solid var(--muted2);border-radius:16px;background:var(--panel);margin-bottom:12px;padding:16px;color:var(--txt);position:relative;}
  .xc:active{background:var(--panel2);}
  .xc.next{border-left-color:var(--accent);border-color:color-mix(in srgb,var(--accent) 45%,var(--line));background:color-mix(in srgb,var(--accent) 6%,var(--panel));}
  .xc.done{border-left-color:var(--up);opacity:.82;}
  .xc.part{border-left-color:var(--accent);}
  .xc .nm{font-weight:800;font-size:1.08rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .xc .st{position:absolute;top:14px;right:14px;font-size:.78rem;font-weight:800;}
  .xc .sub{margin-top:6px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
  .badge{font-size:.62rem;font-weight:800;color:var(--accent);background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:2px 6px;}
  .tag{font-size:.62rem;font-weight:700;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:2px 6px;}
  .chip{font-size:.76rem;font-weight:600;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:4px 9px;display:inline-flex;gap:5px;align-items:center;}
  .chip .k{font-size:.6rem;font-weight:700;color:var(--muted);}
  .cpv{margin-top:4px;width:100%;border:none;background:none;color:var(--muted);text-align:left;padding:0;}
  .copybtn{margin-top:12px;width:100%;height:52px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-weight:800;font-size:.92rem;}
  .startall{width:100%;height:64px;border-radius:16px;border:none;background:var(--accent);color:#0d0e11;font-weight:900;font-size:1.15rem;margin:4px 0 18px;box-shadow:0 6px 20px color-mix(in srgb,var(--accent) 30%,transparent);}
  .editbtn{margin-left:auto;border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:10px 16px;color:var(--txt);font-weight:700;font-size:.85rem;}
  .dh{display:flex;align-items:flex-start;gap:10px;}

  /* ===== フルスクリーン記録モード ===== */
  #wk{position:fixed;inset:0;z-index:50;background:var(--bg);display:none;flex-direction:column;max-width:520px;margin:0 auto;padding:calc(10px + env(safe-area-inset-top)) 18px calc(14px + env(safe-area-inset-bottom));}
  #wk.show{display:flex;}
  .wk-top{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .wk-x{width:48px;height:48px;border-radius:14px;background:var(--panel);border:1px solid var(--line);color:var(--muted);font-size:18px;font-weight:800;flex:0 0 auto;}
  .wk-name{flex:1;font-weight:800;font-size:1.05rem;line-height:1.3;}
  .wk-dots{display:flex;gap:8px;margin:10px 0 4px;}
  .wk-dot{flex:1;height:52px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--muted2);font-weight:800;font-size:.82rem;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.15;padding:0;}
  .wk-dot small{font-size:.6rem;font-weight:700;}
  .wk-dot.cur{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,var(--panel));}
  .wk-dot.ok{border-color:color-mix(in srgb,var(--up) 50%,var(--line));color:var(--up);}
  .wk-mid{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;}
  .wk-prev{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:6px;}
  .wk-prev b{color:var(--txt);}
  .stp{display:flex;align-items:center;gap:12px;margin:7px 0;}
  .stp .lb{width:38px;text-align:center;color:var(--muted);font-size:.74rem;font-weight:700;flex:0 0 auto;}
  .stp button.pm{width:76px;height:84px;border-radius:18px;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-size:34px;font-weight:800;flex:0 0 auto;}
  .stp button.pm:active{background:var(--panel2);border-color:var(--accent);}
  .stp .val{flex:1;height:84px;border-radius:18px;background:var(--panel2);border:2px solid var(--line);display:flex;align-items:baseline;justify-content:center;gap:4px;color:var(--txt);}
  .stp .val .n{font-size:44px;font-weight:900;font-variant-numeric:tabular-nums;line-height:84px;}
  .stp .val .u{font-size:.8rem;color:var(--muted);font-weight:700;}
  .stp .val input{width:100%;height:100%;background:none;border:none;color:var(--txt);font-size:40px;font-weight:900;text-align:center;font-family:inherit;}
  .stp .val input:focus{outline:none;}
  .wk-plates{text-align:center;color:var(--muted2);font-size:.76rem;min-height:1.2em;margin:2px 0 4px;}
  .wk-done{width:100%;height:76px;border-radius:20px;border:none;background:var(--accent);color:#0d0e11;font-weight:900;font-size:1.25rem;margin-top:10px;box-shadow:0 6px 24px color-mix(in srgb,var(--accent) 35%,transparent);}
  .wk-done:active{transform:scale(.985);}
  .wk-sub{width:100%;background:none;border:none;color:var(--muted2);text-decoration:underline;font-size:.82rem;padding:12px 0 2px;}
  .wk-memo{width:100%;height:44px;margin-top:8px;border-radius:12px;background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:0 12px;font-size:13px;font-family:inherit;}

  /* ===== 休憩フルスクリーン ===== */
  .rest-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
  .rest-ring{position:relative;width:230px;height:230px;}
  .rest-ring .in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
  .rest-t{font-size:56px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1.05;}
  .rest-l{color:var(--muted);font-size:.82rem;font-weight:700;}
  #wk.over .rest-t{color:var(--up);}
  .rest-next{width:100%;height:76px;border-radius:20px;border:none;background:var(--panel2);color:var(--txt);border:1px solid var(--line);font-weight:900;font-size:1.15rem;margin-top:14px;}
  #wk.over .rest-next{background:var(--up);color:#0d0e11;border:none;box-shadow:0 6px 24px color-mix(in srgb,var(--up) 35%,transparent);}
  .rest-adj{display:flex;gap:10px;width:100%;margin-top:10px;}
  .rest-adj button{flex:1;height:54px;border-radius:14px;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-weight:800;font-size:.95rem;}
  .flash{animation:fl .5s ease 3;}
  @keyframes fl{0%,100%{background:var(--bg);}50%{background:#233020;}}

  /* ===== 共通カード・部品 ===== */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px;}
  .card h3{margin:0 0 9px;font-size:.98rem;font-weight:800;}
  .head{display:flex;align-items:center;gap:8px;padding:13px;}
  .chev{color:var(--muted2);}
  .btn{flex:1;height:52px;border-radius:12px;border:none;font-weight:800;font-size:.95rem;background:var(--accent);color:#0d0e11;}
  .btn.g{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:0 14px;}
  .saverow{display:flex;gap:8px;margin-top:8px;}
  .danger{width:100%;background:none;border:1px solid #5a2a28;color:var(--down);border-radius:10px;padding:13px;font-weight:700;}
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .wd{border-radius:9px;padding:8px 2px;text-align:center;background:var(--panel2);border:1px solid var(--line);}
  .wd .w{font-size:.62rem;color:var(--muted);font-weight:700;}
  .wd .n{font-size:.8rem;font-weight:800;margin-top:2px;}
  .wd.rest .n{color:var(--muted2);}
  .wd.today{outline:2px solid var(--accent);}
  .pill{display:inline-flex;align-items:center;justify-content:center;height:44px;padding:0 15px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-weight:700;font-size:.85rem;margin:0 6px 8px 0;}
  .pill.on{background:var(--accent);border-color:var(--accent);color:#0d0e11;}
  .sec{color:var(--accent);font-size:.74rem;font-weight:800;margin:14px 0 7px;}
  .erow{display:flex;align-items:center;gap:4px;padding:9px 0;border-bottom:1px solid var(--line);}
  .erow .nm{flex:1;font-weight:700;font-size:.86rem;}
  .erow .ic{width:36px;height:40px;background:none;border:none;color:var(--muted);font-size:15px;font-weight:700;}
  .ins{display:flex;align-items:center;gap:8px;}
  .ins input{width:80px;height:54px;border-radius:12px;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-size:20px;font-weight:700;text-align:center;font-family:inherit;}
  .ins input:focus{outline:none;border-color:var(--accent);}
  .ins .u{color:var(--muted);font-size:.74rem;width:34px;}
  .sb{width:54px;height:54px;border-radius:12px;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-size:26px;font-weight:800;}
  .sw{display:inline-block;width:40px;height:40px;border-radius:50%;margin:0 9px 9px 0;border:3px solid transparent;box-shadow:0 0 0 1px var(--line);vertical-align:middle;}
  .sw.on{border-color:var(--txt);transform:scale(1.08);}

  /* ===== ボトムナビ ===== */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:25;display:flex;max-width:520px;margin:0 auto;background:var(--panel);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);}
  .nav button{flex:1;background:none;border:none;padding:11px 0 9px;color:var(--muted);position:relative;}
  .nav button.on::after{content:'';position:absolute;top:0;left:25%;right:25%;height:3px;background:var(--accent);border-radius:0 0 3px 3px;}
  .nav .ic{font-size:22px;opacity:.55;}
  .nav .lb{font-size:.68rem;font-weight:700;display:block;margin-top:2px;}
  .nav button.on .ic{opacity:1;}
  .nav button.on .lb{color:var(--accent);font-weight:900;}

  /* ===== ミニタイマーバー ===== */
  #mini{position:fixed;left:0;right:0;bottom:calc(64px + env(safe-area-inset-bottom));z-index:26;max-width:520px;margin:0 auto;display:none;align-items:center;gap:10px;background:var(--panel2);border-top:1px solid var(--line);padding:10px 18px 8px;}
  #mini .mbar{position:absolute;left:0;top:0;right:0;height:4px;}
  #mini .mbar i{display:block;height:100%;background:var(--accent);transition:width 1s linear;}
  #mini.over .mbar i{background:var(--up);}
  #mini.show{display:flex;}
  #mini .mt{flex:1;font-weight:800;font-variant-numeric:tabular-nums;font-size:.95rem;color:var(--accent);}
  #mini.over .mt{color:var(--up);}
  #mini .mp,#mini .mx{width:44px;height:44px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-size:14px;font-weight:800;flex:0 0 auto;}
  body.mini-on .app{padding-bottom:calc(140px + env(safe-area-inset-bottom));}

  /* ===== シート・トースト ===== */
  .ov{position:fixed;inset:0;background:#000b;z-index:60;display:none;align-items:flex-end;}
  .ov.show{display:flex;}
  .sheet{width:100%;max-width:520px;margin:0 auto;background:var(--bg);border-radius:22px 22px 0 0;padding:18px;max-height:92vh;overflow:auto;}
  #toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(10px);background:var(--txt);color:#0d0e11;font-weight:800;font-size:.86rem;padding:12px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:.25s;z-index:70;max-width:88%;text-align:center;}
  #toast.show{opacity:1;transform:translateX(-50%);}
  .timer .big{font-size:54px;font-weight:800;font-variant-numeric:tabular-nums;text-align:center;margin:6px 0 0;}
  button,.pill,.tab,.sb,input{touch-action:manipulation;}
  input[type=text],input[type=number]{font-family:inherit;}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>

  <main id="main">読み込み中…</main>

<div id="wk"></div>

<div class="nav" id="nav"></div>
<div class="ov" id="ov"><div class="sheet" id="sheet"></div></div>
<div id="toast"></div>

function big3Latest(k){const a=BIG3[k];return a&&a.length?a[a.length-1].kg:null;}
function repMid(sr){const p=String(sr).split('×')[1]||'';const ns=(p.match(/\d+/g)||[]).map(Number);if(!ns.length)return 10;return ns.length>1?(ns[0]+ns[1])/2:ns[0];}
function repLow(sr){const p=String(sr).split('×')[1]||'';const ns=(p.match(/\d+/g)||[]).map(Number);return ns.length?ns[0]:null;}
function rirMid(r){const ns=(String(r).match(/\d+/g)||[]).map(Number);if(!ns.length)return 1;return ns.length>1?(ns[0]+ns[1])/2:ns[0];}
// 目標レップ+RIRで挙げられる重量をEpley式(1RM=w×(1+reps/30))の逆算で推定
function suggestW(e){
  const[name,sr,rir,,,eq]=e;
  if(eq==='bw')return null;
  const c=EXCOEF[name];if(!c)return null;
  const max=big3Latest(c[0]);if(!max)return null;
  const cap=repMid(sr)+rirMid(rir);
  const w=max*c[1]/(1+cap/30);
  const step=EQ_STEP[eq]??2.5;
  return Math.max(step,Math.round(w/step)*step);
}

const clone=o=>JSON.parse(JSON.stringify(o));
function todayStr(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
function prevSession(d,n){const h=LOGS[exKey(d,n)]||[],t=todayStr();for(let i=h.length-1;i>=0;i--)if(h[i].date<t)return h[i];return null;}
function todaySession(d,n){const h=LOGS[exKey(d,n)]||[],t=todayStr();return h.find(s=>s.date===t)||null;}
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    PROGRAM.forEach(d=>{

function homeCard(day,e,idx,isNext){
  const[name,sr,rir,rest,tagv,eq]=e;
  const prev=prevSession(day.key,name),te=todaySession(day.key,name);
  const badges=`${EQ_LABEL[eq]?`<span class="badge">${EQ_LABEL[eq]}</span>`:''}${tagv?`<span class="tag">${tagv}</span>`:''}`;
  if(te){
    const sum=te.sets.filter(s=>s.w!=null||s.r!=null).map((s,i)=>`<span class="chip"><span class="k">S${i+1}</span>${s.w!=null?fmtW(s.w)+'kg':'–'}×${s.r!=null?s.r:'–'}</span>`).join('');
    return `<button class="xc done" onclick="openWorkout('${day.key}',${idx},true)">
      <span class="st" style="color:var(--up)">✓ 完了</span>
      <div class="nm">${esc(name)} ${badges}</div>
      <div class="sub">${sum||'<span class="pv">データなし</span>'}</div>
      <div class="cpv" style="font-size:.72rem;color:var(--muted2)">タップで修正</div></button>`;
  }
  const prevTxt=prev
    ?`前回 <b style="color:var(--txt)">${prev.sets.filter(s=>s.w!=null||s.r!=null).map(s=>`${s.w!=null?fmtW(s.w):'–'}×${s.r!=null?s.r:'–'}`).join(' / ')}</b>`
    :(suggestW(e)?`推奨 <b style="color:var(--accent)">${fmtW(suggestW(e))}kg</b>(BIG3から算出)`:'初めての種目');
  return `<div class="xc ${isNext?'next':''}" onclick="openWorkout('${day.key}',${idx})" role="button" tabindex="0">
    ${isNext?`<span class="st" style="color:var(--accent)">▶ 次はコレ</span>`:''}
    <div class="nm">${esc(name)} ${badges}</div>
    <div class="sub"><span class="chip"><span class="k">SET</span>${sr}</span><span class="chip"><span class="k">RIR</span>${rir}</span><span class="chip"><span class="k">休憩</span>${rest}</span></div>
    <div class="cpv">${prevTxt}${MEMO[exKey(day.key,name)]?`<br>📝 ${esc(MEMO[exKey(day.key,name)])}`:''}</div>
    ${prev?`<button class="copybtn" onclick="event.stopPropagation();copyPrev('${day.key}',${idx})">⚡ 前回と同じ内容で記録(1タップ)</button>`:''}
  </div>`;
}

// 前回と同じ内容を今日の記録として1タップ保存
function copyPrev(dk,idx){
  const day=PROGRAM.find(d=>d.key===dk),e=day.ex[idx];
  const prev=prevSession(dk,e[0]);if(!prev)return;
  const k=exKey(dk,e[0]),hist=LOGS[k]||[],date=todayStr();
  const en={date,sets:clone(prev.sets)};
  const li=hist.findIndex(x=>x.date===date);
  if(li>=0)hist[li]=en;else hist.push(en);
  LOGS[k]=hist.slice(-50);saveLogs();vib();
  toast('前回と同じ内容で記録しました ✓');renderHome();
}

/* ====== フルスクリーン記録モード ====== */
let W=null; // {dk,idx,setIdx,sets,confirmed,sug,phase:'input'|'rest',restNext,editW,editR}
function openWorkout(dk,idx,isEdit){
  const day=PROGRAM.find(d=>d.key===dk);if(!day||!day.ex[idx])return;
  const e=day.ex[idx],n=setCount(e[1]);
  const prev=prevSession(dk,e[0]),today=todaySession(dk,e[0]);
  const sug=prev?null:suggestW(e);
  const rlow=prev?null:repLow(e[1]);
  const confirmed=new Set();
  const sets=Array.from({length:n},(_,i)=>{
    const tv=today&&today.sets[i]?today.sets[i]:null;
    const pv=prev&&prev.sets[i]?prev.sets[i]:null;
    if(isEdit&&tv&&(tv.w!=null||tv.r!=null))confirmed.add(i);
    return{
      w:tv&&tv.w!=null?tv.w:(pv&&pv.w!=null?pv.w:sug),
      r:tv&&tv.r!=null?tv.r:(pv&&pv.r!=null?pv.r:rlow)
    };
  });
  let setIdx=0;
  for(let i=0;i<n;i++)if(!confirmed.has(i)){setIdx=i;break;}
  W={dk,idx,setIdx,sets,confirmed,sug,phase:'input'};
  document.documentElement.style.setProperty('--accent',day.color);
  wlOn();
  renderWk();
  document.getElementById('wk').classList.add('show');
}
function closeWk(){
  W=null;wlOff();
  document.getElementById('wk').classList.remove('show');
  document.getElementById('wk').classList.remove('over');
  render();
}
function wkDay(){return PROGRAM.find(d=>d.key===W.dk);}
function wkEx(){return wkDay().ex[W.idx];}

function renderWk(){
  if(!W)return;
  const day=wkDay(),e=wkEx();
  const[name,sr,rir,rest,tagv,eq]=e,n=W.sets.length;
  const el=document.getElementById('wk');
  if(W.phase==='rest'){renderWkRest();return;}
  el.classList.remove('over');
  const s=W.sets[W.setIdx]||{};
  const prev=prevSession(W.dk,name);
  const pv=prev&&prev.sets[W.setIdx]?prev.sets[W.setIdx]:null;
  const step=EQ_STEP[eq]??2.5;
  const dots=W.sets.map((x,i)=>{
    const cls=i===W.setIdx?'cur':(W.confirmed.has(i)?'ok':'');
    const v=W.confirmed.has(i)?`${x.w!=null?fmtW(x.w):'–'}×${x.r!=null?x.r:'–'}`:(i===W.setIdx?'入力中':'–');
    return `<button class="wk-dot ${cls}" onclick="wkGoto(${i})">SET${i+1}<small>${v}</small></button>`;
  }).join('');
  const remaining=W.sets.filter((_,i)=>i!==W.setIdx&&!W.confirmed.has(i)).length;
  const isFinal=remaining===0;
  const prevTxt=pv?`前回 <b>${fmtW(pv.w)||'–'}kg × ${pv.r??'–'}回</b>`:(W.sug?`推奨 <b style="color:var(--accent)">${fmtW(W.sug)}kg</b>(BIG3から算出)`:'前回記録なし');
  el.innerHTML=`
    <div class="wk-top">
      <button class="wk-x" onclick="closeWk()">✕</button>
      <div class="wk-name">${esc(name)}<div style="font-size:.72rem;color:var(--muted);font-weight:600">${sr} ・ RIR ${rir} ・ 休憩 ${rest}</div></div>
      <span style="font-size:1.4rem;font-weight:900;color:var(--accent);flex:0 0 auto">${W.setIdx+1}<span style="font-size:.85rem;color:var(--muted)">/${n}</span></span>
    </div>
    <div class="wk-dots">${dots}</div>
    <div class="wk-mid">
      <div class="wk-prev">${prevTxt}</div>
      <div class="stp">
        <span class="lb">重量<br>kg</span>
        <button class="pm" onclick="wkAdj('w',${-step})">−</button>
        <div class="val" id="wv" onclick="wkEditNum('w')"><span class="n">${s.w!=null?fmtW(s.w):'—'}</span><span class="u">kg</span></div>
        <button class="pm" onclick="wkAdj('w',${step})">＋</button>
      </div>
      ${eq==='bb'?`<div class="wk-plates" id="wkPlates">${plateStr(s.w,eq)}</div>`:''}
      <div class="stp">
        <span class="lb">回数</span>
        <button class="pm" onclick="wkAdj('r',-1)">−</button>
        <div class="val" id="rv" onclick="wkEditNum('r')"><span class="n">${s.r!=null?s.r:'—'}</span><span class="u">回</span></div>
        <button class="pm" onclick="wkAdj('r',1)">＋</button>
      </div>
    </div>
    <button class="wk-done" onclick="wkConfirm()">✓ SET ${W.setIdx+1} 完了${isFinal?'(保存)':''}</button>
    ${isFinal?'':`<button class="wk-sub" onclick="wkFinishEarly()">ここまでで保存して終了</button>`}
    <input class="wk-memo" type="text" value="${esc(MEMO[exKey(W.dk,name)]||'')}" placeholder="📝 メモ(シート高さ・グリップ幅など)" maxlength="60" onchange="setMemoCur(this.value)">`;
}
function wkAdj(k,d){
  if(!W)return;
  const s=W.sets[W.setIdx];
  if(k==='w'){let v=s.w!=null?s.w:0;v=Math.max(0,Math.round((v+d)*4)/4);s.w=v;}
  else{let v=s.r!=null?s.r:0;v=Math.max(0,Math.round(v+d));s.r=v;}
  vib(8);
  // 数値部分だけ更新(再描画で±連打が途切れないように)
  const el=document.getElementById(k==='w'?'wv':'rv');
  if(el&&el.querySelector('.n'))el.querySelector('.n').textContent=k==='w'?(s.w!=null?fmtW(s.w):'—'):(s.r!=null?s.r:'—');
  const p=document.getElementById('wkPlates');if(p&&k==='w')p.textContent=plateStr(s.w,wkEx()[5]);
}
function wkEditNum(k){
  if(!W)return;
  const el=document.getElementById(k==='w'?'wv':'rv');if(!el||el.querySelector('input'))return;
  const s=W.sets[W.setIdx];
  const cur=k==='w'?(s.w!=null?fmtW(s.w):''):(s.r!=null?String(s.r):'');
  el.innerHTML=`<input inputmode="${k==='w'?'decimal':'numeric'}" value="${cur}">`;
  const inp=el.querySelector('input');
  inp.focus();inp.select&&inp.select();
  const commit=()=>{
    const v=parseFloat(inp.value);
    if(k==='w')s.w=isNaN(v)?null:Math.max(0,v);
    else s.r=isNaN(v)?null:Math.max(0,Math.round(v));
    renderWk();
  };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')inp.blur();});
}
function wkGoto(i){
  if(!W||W.phase!=='input')return;
  W.setIdx=i;renderWk();
}
// セット確定ごとに即保存(途中でアプリを閉じても残る)
function wkSave(){
  if(!W)return;
  const e=wkEx(),k=exKey(W.dk,e[0]),date=todayStr();
  const sets=W.sets.map((s,i)=>W.confirmed.has(i)?{w:s.w,r:s.r}:{w:null,r:null});
  if(!sets.some(s=>s.w!=null||s.r!=null))return;
  const hist=LOGS[k]||[],li=hist.findIndex(x=>x.date===date);
  const en={date,sets};
  if(li>=0)hist[li]=en;else hist.push(en);
  LOGS[k]=hist.slice(-50);saveLogs();
}
function wkConfirm(){
  if(!W)return;
  W.confirmed.add(W.setIdx);
  wkSave();vib([30,40,30]);
  // 次の未確定セット
  const n=W.sets.length;let nx=-1;
  for(let i=W.setIdx+1;i<n;i++)if(!W.confirmed.has(i)){nx=i;break;}
  if(nx<0)for(let i=0;i<n;i++)if(!W.confirmed.has(i)){nx=i;break;}
  if(nx<0){wkAllDone();return;}
  // いま入れた値を次セットへ引き継ぎ
  const cur=W.sets[W.setIdx];
  if(cur.w!=null)W.sets[nx].w=cur.w;
  if(cur.r!=null)W.sets[nx].r=cur.r;
  W.restNext={type:'set',to:nx};
  wkStartRest();
}
function wkFinishEarly(){
  if(!W)return;
  // 現在表示中セットも値が入っていれば確定扱い
  const s=W.sets[W.setIdx];
  if(s.w!=null||s.r!=null)W.confirmed.add(W.setIdx);
  wkSave();
  wkAllDone(true,true);
}
function wkAllDone(skipRest,goHome){
  const day=wkDay(),e=wkEx();
  // 自己ベスト(推定1RM)判定
  const k=exKey(W.dk,e[0]),hist=LOGS[k]||[],date=todayStr();
  const e1=s2=>s2.w!=null&&s2.r?s2.w*(1+s2.r/30):0;
  const bestOf=ss=>Math.max(0,...ss.map(e1));
  const todayBest=bestOf(W.sets.filter((_,i)=>W.confirmed.has(i)));
  let prevBest=0;hist.forEach(h2=>{if(h2.date<date)prevBest=Math.max(prevBest,bestOf(h2.sets));});
  if(prevBest>0&&todayBest>prevBest+0.01){
    const r1=x=>Math.round(x*10)/10;
    toast(`🎉 自己ベスト更新! 推定1RM ${r1(todayBest)}kg(+${r1(todayBest-prevBest)})`,3200);
  }else toast('記録しました ✓');
  // 次の未記録種目
  const ni=day.ex.findIndex((e2,i2)=>i2!==W.idx&&!todaySession(W.dk,e2[0]));
  if(goHome){closeWk();return;}
  if(skipRest||!AUTOTIMER){ if(ni>=0){openWorkout(W.dk,ni);}else closeWk(); return; }
  W.restNext=ni>=0?{type:'ex',to:ni}:{type:'end'};

function wkStartRest(){
  if(!AUTOTIMER){wkRestDone();return;}

}
function renderWkRest(){

  const R=104,CIRC=2*Math.PI*R;

    <div class="wk-top">

          <circle id="restArc" cx="115" cy="115" r="${R}" fill="none" stroke="${over?'var(--up)':'var(--accent)'}" stroke-width="13" stroke-linecap="round"
            stroke-dasharray="${CIRC.toFixed(1)}" stroke-dashoffset="${over?0:(-CIRC*Math.min(1,tEl/tAlert)).toFixed(1)}" transform="rotate(-90 115 115)"/>
        </svg>
        <div class="in">
          <div class="rest-l">${over?'✓ 休憩終了':'休憩中'}</div>
          <div class="rest-t" id="restT">${over?'+'+mmss(tEl-tAlert):mmss(tAlert-tEl)}</div>
          <div class="rest-l" id="restL2">${over?'':'/ '+mmss(tAlert)}</div>
        </div>
      </div>

        <button onclick="tAdjWk(-30)">−30秒</button>

}
function tAdjWk(d){tAlert=Math.max(15,tAlert+d);tFired=tEl>=tAlert?tFired:false;updateMini();renderWkRest();}
function wkRestDone(exit){
  tReset();
  if(!W){closeWk();return;}
  const nxt=W.restNext||{type:'end'};
  W.restNext=null;
  if(exit||nxt.type==='end'){closeWk();return;}
  if(nxt.type==='set'){W.phase='input';W.setIdx=nxt.to;renderWk();return;}
  openWorkout(W.dk,nxt.to);
}

// バーベル(20kg)基準の片側プレート内訳
function plateStr(w,eq){
  if(eq!=='bb')return '';
  w=parseFloat(w);if(w==null||isNaN(w)||w<=0)return '';
  const bar=20;
  if(w<=bar)return 'バー(20kg)のみ/以下';
  let per=(w-bar)/2,out=[];
  for(const p of [20,15,10,5,2.5,1.25]){while(per>=p-0.001){out.push(p);per-=p;}}
  return `片側: ${out.join(' + ')||'—'}${per>0.01?' +端数':''}`;
}
function setMemoCur(v){
  if(!W)return;
  const e=wkEx(),k=exKey(W.dk,e[0]);
  v=(v||'').trim();if(v)MEMO[k]=v;else delete MEMO[k];
  saveMemoStore();
}

  document.documentElement.style.setProperty('--accent','var(--delts)');
  const wDisp=getWeekDisp();
  const week=wDisp.map(([w,n,wd,isRest])=>`<div class="wd ${isRest?'rest':''} ${wd===todayWd&&!isRest?'today':''}"><div class="w">${w}</div><div class="n">${esc(n)}</div></div>`).join('');
  const stmsg=STORAGE_OK?'記録・体重・メニューはこの端末に保存されます。':'※保存が無効(プライベートモード等)。';
  document.getElementById('main').innerHTML=`
   <div class="eyebrow" style="color:var(--accent)">SETTINGS</div><h2>その他</h2>
   <div class="card">
     <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
       <h3 style="margin:0">📅 週スケジュール</h3>
       <button class="btn g" style="height:40px;padding:0 14px;font-size:.82rem" onclick="openScheduleEditor()">編集</button>
     </div>
     <div class="week">${week}</div></div>
   <div class="card"><h3>⏱ 休憩タイマー</h3>
     <p class="pv" style="margin:0 0 10px">セット完了で種目の休息時間ぶんのタイマーが自動で走ります。</p>
     <span class="pill ${AUTOTIMER?'on':''}" onclick="toggleAutoMore()">自動スタート: ${AUTOTIMER?'ON':'OFF'}</span>
     <span class="pill" onclick="openTimer()">タイマーを開く</span></div>
   <div class="card"><h3>🗑 データ管理</h3>
     <p class="pv" style="margin-bottom:10px">${stmsg}</p>
     <button class="btn g" style="width:100%;margin-bottom:8px" onclick="exportCsv()">記録をCSVで書き出す</button>
     <button class="danger" id="delAll" onclick="delAll(this)">全データを削除</button></div>`;
}
function toggleAutoMore(){toggleAuto();renderMore();}
function openScheduleEditor(){tempSchedule=[...SCHEDULE];renderScheduleEditor();showSheet();}
function renderScheduleEditor(){
  const dn=['月','火','水','木','金','土','日'];
  const opts=[[null,'休'],...PROGRAM.map(d=>[d.key,d.label])];
  let h='<h3 style="margin:0 0 16px">週スケジュール編集</h3>';
  dn.forEach((day,i)=>{
    const cur=tempSchedule[i]??null;
    h+=`<div style="display:flex;align-items:center;gap:6px;padding:10px 0;border-bottom:1px solid var(--line);flex-wrap:wrap">
      <span style="font-weight:800;font-size:1rem;width:26px;flex-shrink:0">${day}</span>
      ${opts.map(([key,label])=>`<span class="pill ${cur===key?'on':''}" style="margin:0;height:38px;padding:0 12px;font-size:.82rem" onclick="scheduleSet(${i},${key===null?'null':"'"+key+"'"})"> ${esc(label)}</span>`).join('')}
    </div>`;
  });
  h+=`<div class="saverow" style="margin-top:16px"><button class="btn" onclick="scheduleCommit()">保存</button><button class="btn g" onclick="closeSheet()">取消</button></div>`;
  document.getElementById('sheet').innerHTML=h;
}
function scheduleSet(i,key){tempSchedule[i]=key;renderScheduleEditor();}
function scheduleCommit(){
  SCHEDULE=[...tempSchedule];
  saveSchedule();
  todayKey=SCHEDULE[todayWd===0?6:todayWd-1]||null;
  closeSheet();renderMore();toast('スケジュールを保存');
}
function exportCsv(){
  const rows=[['日付','部位','種目','セット','重量kg','回数']];
  PROGRAM.forEach(d=>d.ex.forEach(e=>(LOGS[exKey(d.key,e[0])]||[]).forEach(s=>s.sets.forEach((st,i)=>{if(st.w!=null||st.r!=null)rows.push([s.date,d.label,e[0],i+1,st.w??'',st.r??'']);}))));
  BW.forEach(b=>rows.push([b.date,'体重','体重','',b.kg,'']));
  if(rows.length<2){toast('記録がありません');return;}
  const csv='\ufeff'+rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'}),url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='gym-log.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);toast('CSVを書き出し');
}
let delArm=false;
function delAll(btn){if(!delArm){delArm=true;btn.textContent='もう一度タップで全削除';setTimeout(()=>{delArm=false;btn.textContent='全データを削除';},3000);return;}
  LOGS={};BW=[];BIG3={bench:[],squat:[],deadlift:[]};PROGRAM=clone(DEFAULT);MEMO={};saveMemoStore();saveLogs();saveBW();saveBIG3();saveProgram();delArm=false;activeDay=todayKey||'chest';renderMore();toast('全データを削除しました');}

/* ====== 休憩タイマーエンジン ====== */
let tEl=0,tRun=false,tAlert=90,tFired=false,tInt=null,actx=null;
let AUTOTIMER=true;try{AUTOTIMER=localStorage.getItem('gym-autotimer-v1')!=='0';}catch(e){}
function toggleAuto(){AUTOTIMER=!AUTOTIMER;try{localStorage.setItem('gym-autotimer-v1',AUTOTIMER?'1':'0');}catch(e){}if(document.getElementById('timerBox'))renderTimer();}
// '90秒'/'2分'/'2–3分'/'60–90秒' → 秒数(下限値を採用)
function restSecs(rest){const m=String(rest||'').match(/(\d+(?:\.\d+)?)/);if(!m)return 90;const v=parseFloat(m[1]);return Math.max(15,Math.round(/分/.test(rest)?v*60:v));}
function startRestTimer(sec){
  tAlert=sec;tEl=0;tFired=false;
  clearInterval(tInt);
  tRun=true;
  try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();}catch(e){}
  tInt=setInterval(tTick,1000);
  updateMini();
}
function tTick(){
  tEl++;
  if(!tFired&&tEl>=tAlert){
    tFired=true;beep();setTimeout(beep,500);setTimeout(beep,1000);
    vib([200,100,200,100,400]);
    const b=document.getElementById('restWrap')||document.getElementById('timerBox');
    if(b){b.classList.add('flash');setTimeout(()=>b.classList.remove('flash'),1600);}
  }
  updateMini();
  if(W&&W.phase==='rest')updateWkRest();
  if(document.getElementById('timerBox'))renderTimer();
}
function updateWkRest(){
  const over=tEl>=tAlert;
  const el=document.getElementById('wk');
  if(over&&!el.classList.contains('over')){renderWkRest();return;} // 終了時は全体を描き直し(ボタン文言・色)
  const t=document.getElementById('restT');if(t)t.textContent=over?'+'+mmss(tEl-tAlert):mmss(tAlert-tEl);
  const arc=document.getElementById('restArc');
  if(arc&&!over){const R=104,CIRC=2*Math.PI*R;arc.setAttribute('stroke-dashoffset',(-CIRC*Math.min(1,tEl/tAlert)).toFixed(1));}
}
function updateMini(){
  const el=document.getElementById('mini');if(!el)return;
  const active=(tRun||tEl>0)&&!(W&&W.phase==='rest'); // 記録モード中は全画面表示があるので非表示
  el.classList.toggle('show',active);
  document.body.classList.toggle('mini-on',active);
  if(!active)return;
  el.classList.toggle('over',tEl>=tAlert);
  el.querySelector('.mt').textContent=tEl>=tAlert?`✓ 休憩終了 +${mmss(tEl-tAlert)}`:`⏱ 休憩中 残り ${mmss(tAlert-tEl)}`;
  el.querySelector('.mp').textContent=tRun?'❚❚':'▶';
  const bar=el.querySelector('.mbar i');if(bar)bar.style.width=Math.min(100,Math.round(tEl/tAlert*100))+'%';
}
function beep(){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(0.0001,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.35,actx.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+0.4);o.start();o.stop(actx.currentTime+0.42);}catch(e){}}
const mmss=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
function openTimer(){renderTimer();showSheet();}
function renderTimer(){
  const over=tEl>=tAlert;
  document.getElementById('sheet').innerHTML=`<div class="timer ${over?'over':''}" id="timerBox">
    <div class="pv" style="text-align:center">休憩タイマー</div>
    <div style="position:relative;width:200px;height:200px;margin:8px auto 12px">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="86" fill="none" stroke="var(--panel2)" stroke-width="12"/>
        <circle cx="100" cy="100" r="86" fill="none" stroke="${over?'var(--up)':'var(--accent)'}" stroke-width="12" stroke-linecap="round"
          stroke-dasharray="540.4" stroke-dashoffset="${over?0:(-540.4*Math.min(1,tEl/tAlert)).toFixed(1)}" transform="rotate(-90 100 100)"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px">
        ${over
          ?`<div style="font-size:.95rem;font-weight:800;color:var(--up)">✓ 休憩終了</div><div style="font-size:1.8rem;font-weight:800;color:var(--up);font-variant-numeric:tabular-nums">+${mmss(tEl-tAlert)}</div>`
          :`<div style="font-size:2.4rem;font-weight:800;color:var(--txt);line-height:1.1;font-variant-numeric:tabular-nums">${mmss(tAlert-tEl)}</div><div class="pv">残り / 設定 ${mmss(tAlert)}</div>`}
        <div class="pv">経過 ${mmss(tEl)}</div>
      </div>
    </div>
    <div class="saverow"><button class="btn" onclick="tToggle()">${tRun?'一時停止':'スタート'}</button><button class="btn g" onclick="tReset()">リセット</button></div>
    <div class="pv" style="margin:16px 0 8px;text-align:center">アラート時間: ${mmss(tAlert)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:10px">
      <button onclick="tAdj(-30)" style="height:52px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:13px;font-weight:800">−30s</button>
      <button onclick="tAdj(-15)" style="height:52px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:13px;font-weight:800">−15s</button>
      <button onclick="tAdj(15)" style="height:52px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:13px;font-weight:800">＋15s</button>
      <button onclick="tAdj(30)" style="height:52px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:13px;font-weight:800">＋30s</button>
    </div>
    <div style="display:flex;justify-content:center;flex-wrap:wrap;gap:6px">${[60,90,120,150,180].map(p=>`<span class="pill ${tAlert===p?'on':''}" onclick="tPreset(${p})">${p}s</span>`).join('')}</div>
    <div style="text-align:center;margin-top:14px"><span class="pill ${AUTOTIMER?'on':''}" onclick="toggleAuto()">セット保存時に自動スタート: ${AUTOTIMER?'ON':'OFF'}</span></div>
    <button class="btn g" style="width:100%;margin-top:14px" onclick="closeSheet()">閉じる</button></div>`;
}
function tToggle(){
  if(tRun){tRun=false;clearInterval(tInt);}
  else{tRun=true;try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();}catch(e){}clearInterval(tInt);tInt=setInterval(tTick,1000);}
  updateMini();if(document.getElementById('timerBox'))renderTimer();
}
function tReset(){tRun=false;clearInterval(tInt);tEl=0;tFired=false;updateMini();if(document.getElementById('timerBox'))renderTimer();}
function tAdj(d){tAlert=Math.max(15,tAlert+d);tFired=tEl>=tAlert?tFired:false;updateMini();renderTimer();}
function tPreset(p){tAlert=p;tFired=false;updateMini();renderTimer();}

function hideTip(){TIPDONE=true;try{localStorage.setItem('gym-tip-v1','1');}catch(e){}renderHome();}
/* ====== シート開閉 ====== */
function showSheet(){document.getElementById('ov').classList.add('show');}
function closeSheet(){
  document.getElementById('ov').classList.remove('show');
  // 「＋追加」直後に保存せず閉じた場合は空メニューを破棄
  if(newDayKey){
    const d=PROGRAM.find(x=>x.key===newDayKey);
    if(d&&d.ex.length===0&&d.label==='新メニュー'){
      PROGRAM=PROGRAM.filter(x=>x.key!==newDayKey);
      SCHEDULE=SCHEDULE.map(k=>k===newDayKey?null:k);
      saveProgram();
      if(activeDay===newDayKey)activeDay=PROGRAM[0].key;
      render();
    }
    newDayKey=null;
  }
}
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeSheet();});
// 想定外のエラーで画面がスタックしないための自己回復
window.addEventListener('error',()=>{try{document.getElementById('ov').classList.remove('show');newDayKey=null;toast('エラーが発生しました。操作をやり直してください');}catch(_e){}});

/* ====== 履歴 ====== */
function dayMeta(k){const d=PROGRAM.find(x=>x.key===k);return d?{label:d.label,color:d.color}:{label:k,color:'var(--muted)'};}
function setsStr(sets){const a=sets.filter(s=>s.w!=null||s.r!=null).map(s=>`${s.w!=null?fmtW(s.w):'-'}×${s.r!=null?s.r:'-'}`);return a.length?a.join(',  '):'記録なし';}
function setsDone(sets){return sets.filter(s=>s.w!=null&&s.r!=null).length;}
function wdName(date){const[y,m,d]=date.split('-').map(Number);return ['日','月','火','水','木','金','土'][new Date(y,m-1,d).getDay()];}
function setHView(v){hview=v;expandedH.clear();renderHistory();}
function setHPart(k){hpart=k;expandedH.clear();renderHistory();}
function togH(k){expandedH.has(k)?expandedH.delete(k):expandedH.add(k);renderHistory();}

function buildByDate(){
  const map={};
  Object.keys(LOGS).forEach(k=>{const i=k.indexOf('|'),dk=k.slice(0,i),name=k.slice(i+1);
    LOGS[k].forEach(s=>{(map[s.date]=map[s.date]||{});(map[s.date][dk]=map[s.date][dk]||[]).push({name,sets:s.sets});});});
  return Object.keys(map).sort().reverse().map(date=>({date,days:map[date]}));
}
function lineChart(vals){
  if(vals.length<2)return '';
  const Wd=Math.min(440,(document.querySelector('.app')?.clientWidth||360)-66),H=140;
  const mn=Math.min(...vals),mx=Math.max(...vals),pad=(mx-mn)*0.15||1,lo=mn-pad,hi=mx+pad;
  const X=i=>15+i/(vals.length-1)*Wd,Y=v=>10+(1-(v-lo)/(hi-lo))*(H-30);
  const pts=vals.map((v,i)=>`${X(i)},${Y(v)}`).join(' ');
  return `<div class="card"><div class="pv" style="margin-bottom:6px">セッション総挙上量の推移</div><svg width="${Wd+30}" height="${H}">
    <text x="15" y="${Y(mx)-4}" fill="var(--muted2)" font-size="10">${Math.round(mx).toLocaleString()}kg</text>
    <text x="15" y="${Y(mn)+12}" fill="var(--muted2)" font-size="10">${Math.round(mn).toLocaleString()}kg</text>
    <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
    ${vals.map((v,i)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="${i===vals.length-1?4:2.5}" fill="var(--accent)"/>`).join('')}</svg></div>`;
}
function sessionCard(key,dateLabel,sub,totS,totV,bodyHtml){
  const open=expandedH.has(key);
  return `<div class="card" style="padding:0">
    <div class="head" onclick="togH('${key}')">
      <div><div style="font-weight:800;font-size:1.02rem">${dateLabel}</div><div style="margin-top:4px">${sub}</div></div>
      <div style="margin-left:auto;text-align:right"><div class="pv">${totS}セット</div><div style="font-weight:800;font-size:.9rem">${Math.round(totV).toLocaleString()}kg</div></div>
      <span class="chev" style="margin-left:8px">${open?'▾':'▸'}</span></div>
    ${open?`<div style="padding:0 13px 13px">${bodyHtml}</div>`:''}</div>`;
}
function exLines(list){return list.map(x=>`<div style="padding:7px 0;border-top:1px solid var(--line)"><div style="font-weight:700;font-size:.85rem">${esc(x.name)}</div><div class="pv" style="margin-top:2px">${setsStr(x.sets)}</div></div>`).join('');}

function histDate(){
  const arr=buildByDate();
  if(!arr.length)return '<p style="color:var(--muted2);text-align:center;padding:30px 0">まだ記録がありません。<br>ワークアウトを保存すると、ここに日付ごとに表示されます。</p>';
  return arr.map(({date,days})=>{
    const[, m,d]=date.split('-').map(Number);
    let totV=0,totS=0,badges='',body='';
    Object.keys(days).forEach(dk=>{const meta=dayMeta(dk),list=days[dk];
      const v=list.reduce((a,x)=>a+vol(x.sets),0),sc=list.reduce((a,x)=>a+setsDone(x.sets),0);
      totV+=v;totS+=sc;
      badges+=`<span class="badge" style="color:${meta.color};border-color:${meta.color}66;margin-right:5px">${esc(meta.label)}</span>`;
      body+=`<div style="margin-top:6px"><div class="pv" style="color:${meta.color};font-weight:800">${esc(meta.label)}</div>${exLines(list)}</div>`;});
    return sessionCard('hd-'+date,`${m}/${d} <span class="pv">(${wdName(date)})</span>`,badges,totS,totV,body);
  }).join('');
}

function histPart(){
  let h=`<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:10px">${PROGRAM.map(d=>{const on=hpart===d.key;return`<span class="pill ${on?'on':''}" style="margin:0;flex:0 0 auto;${on?`background:${d.color};border-color:${d.color};color:#0d0e11`:'font-weight:700'}" onclick="setHPart('${d.key}')">${esc(d.label)}</span>`}).join('')}</div>`;
  const prefix=hpart+'|',map={};
  Object.keys(LOGS).filter(k=>k.indexOf(prefix)===0).forEach(k=>{const name=k.slice(prefix.length);
    LOGS[k].forEach(s=>{(map[s.date]=map[s.date]||[]).push({name,sets:s.sets});});});
  const datesAsc=Object.keys(map).sort();
  if(!datesAsc.length)return h+'<p style="color:var(--muted2);text-align:center;padding:30px 0">この部位の記録はまだありません。</p>';
  const vols=datesAsc.map(dt=>map[dt].reduce((a,x)=>a+vol(x.sets),0));
  const meta=dayMeta(hpart);
  h+=`<div class="pv" style="margin:4px 0 10px">${esc(meta.label)}の記録: ${datesAsc.length}回</div>`;
  h+=lineChart(vols);
  h+=[...datesAsc].reverse().map(date=>{const[, m,d]=date.split('-').map(Number),list=map[date];
    const v=list.reduce((a,x)=>a+vol(x.sets),0),sc=list.reduce((a,x)=>a+setsDone(x.sets),0);
    return sessionCard('hp-'+date,`${m}/${d} <span class="pv">(${wdName(date)})</span>`,`<span class="badge" style="color:${meta.color};border-color:${meta.color}66">${esc(meta.label)}</span>`,sc,v,exLines(list));
  }).join('');
  return h;
}

function renderHistory(){
  document.getElementById('tabsWrap').innerHTML='';
  document.documentElement.style.setProperty('--accent','#f0a23b');
  const seg=`<div style="display:flex;gap:8px;margin-bottom:14px">
    <button class="pill ${hview==='date'?'on':''}" style="flex:1;height:46px;margin:0;border:1px solid ${hview==='date'?'var(--accent)':'var(--line)'}" onclick="setHView('date')">日付ごと</button>
    <button class="pill ${hview==='part'?'on':''}" style="flex:1;height:46px;margin:0;border:1px solid ${hview==='part'?'var(--accent)':'var(--line)'}" onclick="setHPart2()">部位ごと</button></div>`;
  document.getElementById('main').innerHTML=
    `<div class="eyebrow" style="color:var(--accent)">HISTORY</div><h2>トレ履歴</h2>`+seg+(hview==='date'?histDate():histPart());
}
function setHPart2(){hview='part';expandedH.clear();renderHistory();}

/* ====== 起動 ====== */
initStore();migrateMenu();
todayKey=SCHEDULE[todayWd===0?6:todayWd-1]||null;
activeDay=todayKey||PROGRAM[0]?.key||'chest';
hpart=todayKey||PROGRAM[0]?.key||'chest';
buildNav();render();
</script>
