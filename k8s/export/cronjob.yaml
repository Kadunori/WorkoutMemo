# CronJob: 毎週日曜 0:00 JST (土 15:00 UTC) に全ユーザーの記録を S3 へバックアップ
# 将来の拡張例として配置（現在は手動エクスポート = export-service の HTTP エンドポイント）
apiVersion: batch/v1
kind: CronJob
metadata:
  name: workout-backup
  namespace: workout-backend
spec:
  schedule: "0 15 * * 6"  # JST 日曜 0:00
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: <ECR_REPO>/export-service:latest
              command: ["/bin/export-service", "--mode=backup"]
              env:
                - name: JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: JWT_SECRET
                - name: WORKOUT_SERVICE_URL
                  value: "http://workout-service.workout-backend.svc.cluster.local:8080"
                - name: USER_SERVICE_URL
                  value: "http://user-service.workout-backend.svc.cluster.local:8080"
                - name: S3_BUCKET
                  value: "workout-memo-backups"
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "500m"
