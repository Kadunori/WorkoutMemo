apiVersion: apps/v1
kind: Deployment
metadata:
  name: export-service
  namespace: workout-backend
  labels:
    app: export-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: export-service
  template:
    metadata:
      labels:
        app: export-service
    spec:
      containers:
        - name: export-service
          image: <ECR_REPO>/export-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET
            - name: WORKOUT_SERVICE_URL
              value: "http://workout-service.workout-backend.svc.cluster.local:8080"
            - name: USER_SERVICE_URL
              value: "http://user-service.workout-backend.svc.cluster.local:8080"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: export-service
  namespace: workout-backend
spec:
  selector:
    app: export-service
  ports:
    - port: 8080
      targetPort: 8080
