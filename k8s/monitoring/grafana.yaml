apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: workout-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.0.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"  # 本番では Secret に移す
            - name: GF_DATASOURCES_DEFAULT_TYPE
              value: prometheus
            - name: GF_DATASOURCES_DEFAULT_URL
              value: http://prometheus.workout-monitoring.svc.cluster.local:9090
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: workout-monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: NodePort  # ローカル確認用。本番は LoadBalancer or Ingress に変更
