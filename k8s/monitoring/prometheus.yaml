apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: workout-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'auth-service'
        static_configs:
          - targets: ['auth-service.workout-backend.svc.cluster.local:8080']
        metrics_path: /metrics
      - job_name: 'workout-service'
        static_configs:
          - targets: ['workout-service.workout-backend.svc.cluster.local:8080']
        metrics_path: /metrics
      - job_name: 'user-service'
        static_configs:
          - targets: ['user-service.workout-backend.svc.cluster.local:8080']
        metrics_path: /metrics
      - job_name: 'menu-service'
        static_configs:
          - targets: ['menu-service.workout-backend.svc.cluster.local:8080']
        metrics_path: /metrics
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: workout-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: workout-monitoring
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
# Prometheus が K8s API を叩く権限
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: workout-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, pods, services, endpoints]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: workout-monitoring
