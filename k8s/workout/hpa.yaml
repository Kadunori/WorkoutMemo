# HPA: ワークアウト記録が集中するトレーニング時間帯に自動スケール
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workout-service-hpa
  namespace: workout-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workout-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
