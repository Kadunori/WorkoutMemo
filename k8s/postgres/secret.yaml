# 本番では Sealed Secrets / AWS Secrets Manager CSI Driver を使用すること
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: workout-data
type: Opaque
stringData:
  POSTGRES_USER: workout
  POSTGRES_PASSWORD: changeme_in_production
  POSTGRES_DB: postgres
  # 各サービス用 DB 接続文字列
  AUTH_DATABASE_URL: "postgres://workout:changeme_in_production@postgres:5432/auth_db?sslmode=disable"
  WORKOUT_DATABASE_URL: "postgres://workout:changeme_in_production@postgres:5432/workout_db?sslmode=disable"
  USER_DATABASE_URL: "postgres://workout:changeme_in_production@postgres:5432/user_db?sslmode=disable"
  MENU_DATABASE_URL: "postgres://workout:changeme_in_production@postgres:5432/menu_db?sslmode=disable"
