apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: workout-data
data:
  # PostgreSQL 起動時に各サービス用 DB を作成する
  init.sql: |
    CREATE DATABASE auth_db;
    CREATE DATABASE workout_db;
    CREATE DATABASE user_db;
    CREATE DATABASE menu_db;
    GRANT ALL PRIVILEGES ON DATABASE auth_db TO workout;
    GRANT ALL PRIVILEGES ON DATABASE workout_db TO workout;
    GRANT ALL PRIVILEGES ON DATABASE user_db TO workout;
    GRANT ALL PRIVILEGES ON DATABASE menu_db TO workout;
