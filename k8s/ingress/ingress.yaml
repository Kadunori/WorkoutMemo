# AWS EKS 用: AWS Load Balancer Controller が必要
# ローカル kind 用: nginx Ingress Controller を使用
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workout-ingress
  namespace: workout-frontend  # Ingress はフロントエンドの namespace に置く
  annotations:
    # --- ローカル kind 用 ---
    kubernetes.io/ingress.class: nginx
    # --- AWS EKS 用 (kind用アノテーションと切り替える) ---
    # kubernetes.io/ingress.class: alb
    # alb.ingress.kubernetes.io/scheme: internet-facing
    # alb.ingress.kubernetes.io/target-type: ip
    # alb.ingress.kubernetes.io/certificate-arn: <ACM_ARN>
spec:
  rules:
    - host: workout.local  # EKS では Route53 ドメインに変更
      http:
        paths:
          # API ルーティング（パスプレフィックスで各バックエンドサービスへ）
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service-ext
                port:
                  number: 8080
          - path: /workouts
            pathType: Prefix
            backend:
              service:
                name: workout-service-ext
                port:
                  number: 8080
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: user-service-ext
                port:
                  number: 8080
          - path: /menus
            pathType: Prefix
            backend:
              service:
                name: menu-service-ext
                port:
                  number: 8080
          - path: /export
            pathType: Prefix
            backend:
              service:
                name: export-service-ext
                port:
                  number: 8080
          # フロントエンド（最後にキャッチオール）
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
---
# ExternalName Service: frontend namespace から backend namespace のサービスへルーティング
# K8s では namespace 跨ぎはこのパターンを使う
apiVersion: v1
kind: Service
metadata:
  name: auth-service-ext
  namespace: workout-frontend
spec:
  type: ExternalName
  externalName: auth-service.workout-backend.svc.cluster.local
  ports:
    - port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: workout-service-ext
  namespace: workout-frontend
spec:
  type: ExternalName
  externalName: workout-service.workout-backend.svc.cluster.local
  ports:
    - port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: user-service-ext
  namespace: workout-frontend
spec:
  type: ExternalName
  externalName: user-service.workout-backend.svc.cluster.local
  ports:
    - port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: menu-service-ext
  namespace: workout-frontend
spec:
  type: ExternalName
  externalName: menu-service.workout-backend.svc.cluster.local
  ports:
    - port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: export-service-ext
  namespace: workout-frontend
spec:
  type: ExternalName
  externalName: export-service.workout-backend.svc.cluster.local
  ports:
    - port: 8080
