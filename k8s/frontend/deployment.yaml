apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: workout-frontend
data:
  default.conf: |
    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;
      location / {
        try_files $uri /index.html;
      }
      location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: workout-frontend
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 15
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      initContainers:
        # index.html を ConfigMap から /usr/share/nginx/html にコピー
        - name: copy-html
          image: busybox
          command: ["sh", "-c", "cp /src/index.html /html/index.html && cp /src/icon.png /html/icon.png 2>/dev/null || true"]
          volumeMounts:
            - name: src
              mountPath: /src
            - name: html
              mountPath: /html
      volumes:
        - name: src
          configMap:
            name: frontend-html
        - name: html
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: workout-frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
